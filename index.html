<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>不规则日常 · 邓杰 & 王泊宁</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.5;
            color: #1e2a3e;
            background: #eef2f8;
            min-height: 100vh;
            padding: 2rem 1.5rem;
        }

        /* 整体容器 — 三个独立大版块竖直排列 */
        .irregular-world {
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 2.5rem;
        }

        /* 每个独立版块共用背景+阴影，但形状不同 */
        .block {
            background: #ffffff;
            border-radius: 2rem;
            box-shadow: 0 20px 30px -12px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease, box-shadow 0.2s;
            overflow: hidden;  /* 保证子元素异形裁切时边界干净，但保留clip-path外轮廓 */
        }

        .block:hover {
            transform: translateY(-5px);
            box-shadow: 0 28px 36px -14px rgba(0, 0, 0, 0.2);
        }

        /* ---------- 版块1：分成三块 (水平三列) 每个小块不同多边形轮廓 ---------- */
        .block-split-3 {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0;
            background: transparent;  /* 父级无背景，每个子块独立形状 */
            box-shadow: none;
        }

        .tri-card {
            background: white;
            padding: 1.8rem 1.2rem;
            transition: all 0.25s;
            box-shadow: 0 8px 18px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
        }

        /* 左边块 — 三角形 (正三角轮廓) */
        .shape-triangle-left {
            clip-path: polygon(0% 0%, 100% 0%, 85% 100%, 0% 100%);
            border-radius: 1.5rem 0 0 1.5rem;
            margin-right: -8px; /* 让相邻衔接更自然 */
            z-index: 2;
        }

        /* 中间块 — 梯形 (上窄下宽) */
        .shape-trapezoid-mid {
            clip-path: polygon(8% 0%, 92% 0%, 100% 100%, 0% 100%);
            margin: 0 -6px;
            z-index: 3;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }

        /* 右边块 — 反向三角形 (类似右下斜切) */
        .shape-reverse-triangle {
            clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%);
            border-radius: 0 1.5rem 1.5rem 0;
            margin-left: -8px;
        }

        .tri-card:hover {
            background: #fffbf0;
            transform: scale(0.98);
        }

        .card-icon-big {
            font-size: 2.8rem;
            margin-bottom: 0.75rem;
        }

        .tri-card h3 {
            font-size: 1.5rem;
            margin-bottom: 0.3rem;
            color: #1f4b6e;
        }

        .tri-card p {
            font-size: 0.85rem;
            color: #5e7c9c;
            max-width: 200px;
        }

        /* ---------- 版块2：分成一块 (整块但外形是六边形感+梯形混合，自定义clip) ---------- */
        .block-single {
            background: linear-gradient(125deg, #fff6ed, #ffffff);
            padding: 2rem 2rem;
            clip-path: polygon(5% 0%, 95% 0%, 100% 20%, 100% 80%, 95% 100%, 5% 100%, 0% 80%, 0% 20%);
            /* 八边形类似梯形+六边形趣味 */
            border-radius: 2rem 3rem 2rem 3rem;
        }

        .together-showcase {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 1.5rem;
        }

        .together-text {
            flex: 2;
        }

        .together-text h2 {
            font-size: 1.8rem;
            border-left: 6px solid #e6a157;
            padding-left: 1rem;
            margin-bottom: 0.8rem;
            color: #1f3b4c;
        }

        .together-text p {
            color: #2c577c;
            margin-bottom: 0.8rem;
        }

        .together-stats {
            flex: 1;
            background: #f7efe3;
            padding: 1rem;
            border-radius: 2rem;
            text-align: center;
            clip-path: polygon(10% 0%, 90% 0%, 100% 30%, 90% 100%, 10% 100%, 0% 70%);
        }

        /* ---------- 版块3：分成两块 (左块梯形，右块平行四边形/菱形感) ---------- */
        .block-split-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.8rem;
            background: transparent;
            box-shadow: none;
        }

        .dual-left {
            background: #ffffff;
            padding: 1.8rem;
            clip-path: polygon(0% 0%, 90% 0%, 100% 20%, 100% 80%, 90% 100%, 0% 100%);
            border-radius: 2rem 0.5rem 2rem 0.5rem;
            transition: all 0.2s;
        }

        .dual-right {
            background: #ffffff;
            padding: 1.8rem;
            clip-path: polygon(10% 0%, 100% 0%, 100% 80%, 90% 100%, 0% 100%, 0% 20%);
            border-radius: 0.5rem 2rem 0.5rem 2rem;
            transition: all 0.2s;
        }

        .dual-left:hover, .dual-right:hover {
            background: #fefaf5;
            transform: scale(0.99);
        }

        .profile-mini {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .profile-mini h3 {
            font-size: 1.6rem;
            color: #1d4e74;
            border-bottom: 2px dashed #e6a157;
            display: inline-block;
            margin-bottom: 0.5rem;
        }

        .hobby-list {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.8rem 0;
        }

        .hobby-badge {
            background: #eef3fc;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.75rem;
        }

        .btn-detail {
            background: #e6a15720;
            border: 1px solid #e6a157;
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #a8641c;
            cursor: pointer;
            width: fit-content;
            margin-top: 0.5rem;
            transition: 0.2s;
        }

        .btn-detail:hover {
            background: #e6a157;
            color: white;
        }

        /* 通用返回按钮区域 */
        .global-back {
            margin-bottom: 2rem;
            text-align: left;
        }

        .back-home-btn {
            background: #eef2ff;
            padding: 0.5rem 1.5rem;
            border-radius: 40px;
            text-decoration: none;
            color: #1e4a76;
            font-weight: 500;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: 0.2s;
            cursor: pointer;
            border: none;
        }

        .back-home-btn:hover {
            background: #e1e9fc;
            transform: translateX(-4px);
        }

        /* 隐藏辅助 */
        .hidden-page {
            display: none;
        }

        /* 详情页样式 (独立不规则感保留但整洁) */
        .detail-container {
            max-width: 1000px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 30px rgba(0,0,0,0.08);
            clip-path: polygon(0% 0%, 100% 0%, 98% 5%, 100% 95%, 96% 100%, 4% 100%, 0% 95%, 2% 5%);
        }

        .detail-header {
            text-align: center;
            margin-bottom: 2rem;
        }

        .detail-header h1 {
            font-size: 2.4rem;
            color: #153e5a;
        }

        .info-grid {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .info-card {
            background: #faf9fe;
            padding: 1rem 1.5rem;
            border-radius: 1rem;
            border-left: 5px solid #e6a157;
        }

        @media (max-width: 800px) {
            .block-split-3 {
                grid-template-columns: 1fr;
                gap: 1rem;
            }
            .shape-triangle-left, .shape-trapezoid-mid, .shape-reverse-triangle {
                clip-path: none;
                border-radius: 1.5rem;
                margin: 0;
            }
            .block-split-2 {
                grid-template-columns: 1fr;
                gap: 1.2rem;
            }
            .dual-left, .dual-right {
                clip-path: none;
                border-radius: 1.5rem;
            }
            .block-single {
                clip-path: none;
                border-radius: 1.5rem;
            }
            .together-showcase {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div id="app"></div>

    <script>
        // ---------- 详细数据 (个人 & 共同) ----------
        const dengjieDetail = {
            name: "邓杰",
            role: "全栈工程师 · 光影收集者",
            bio: "喜欢将代码写成诗，用快门捕捉日常微光。和泊宁一起探索城市角落，胶片相机与复古骑行爱好者。",
            hobby: ["📷 胶片摄影", "☕ 手冲咖啡", "🚴 骑行", "🎧 播客", "✍️ 技术写作"],
            project: "「食光机」小程序联合创始人，记录双人美食地图。",
            quote: "最近和王泊宁一起研究复古暗房，每周冲洗胶卷。"
        };
        const wangboningDetail = {
            name: "王泊宁",
            role: "创意开发 · 设计思维",
            bio: "设计师出身的开发者，用创意连接代码与美学。和邓杰一起创立「两人日常」品牌，热爱播客与动效。",
            hobby: ["🎨 数字插画", "🎹 键盘即兴", "🏂 滑雪", "🎬 vlog", "🐱 猫奴"],
            project: "播客「杰宁漫谈」主播，全平台播放量15w+。",
            quote: "痴迷和邓杰摆创意市集，用设计记录城市故事。"
        };
        const togetherDetail = {
            name: "邓杰 & 王泊宁",
            role: "生活合伙人 · 创意共同体",
            bio: "「两人日常」是一个关于友谊、创造与共生的记录。共同探索代码、设计、食物与城市。",
            highlight: ["开源组件库 800+ Star", "两人食记 IP 5w+粉丝", "24节气日常展双城联动"],
            project: "每月离线日，徒步/写生/发呆，相信日常的诗意。"
        };

        // 页面状态管理
        let currentPage = "index"; // 'index', 'dengjie', 'wangboning', 'together'

        function renderIndex() {
            // 不规则三大板块
            return `
                <div class="irregular-world">
                    <!-- 板块1: 分成三块 (邓杰、王泊宁、共同日常入口) 每个卡片异形轮廓 -->
                    <div class="block block-split-3">
                        <div class="tri-card shape-triangle-left" data-nav="dengjie">
                            <div class="card-icon-big">🌿📸</div>
                            <h3>邓杰的日常</h3>
                            <p>全栈·光影收集者<br>胶片与代码的双重奏</p>
                            <div style="margin-top: 12px; font-size:0.7rem; color:#e6a157;">✦ 点击探索</div>
                        </div>
                        <div class="tri-card shape-trapezoid-mid" data-nav="together">
                            <div class="card-icon-big">✨🤝✨</div>
                            <h3>两人的共同日常</h3>
                            <p>共同项目 · 双城灵感<br>播客/食记/联合创作</p>
                            <div style="margin-top: 12px; font-size:0.7rem; color:#e6a157;">✦ 交叠星光</div>
                        </div>
                        <div class="tri-card shape-reverse-triangle" data-nav="wangboning">
                            <div class="card-icon-big">🎨🎙️</div>
                            <h3>王泊宁的日常</h3>
                            <p>创意开发 · 设计思维<br>动效与插画魔法</p>
                            <div style="margin-top: 12px; font-size:0.7rem; color:#e6a157;">✦ 灵感宇宙</div>
                        </div>
                    </div>

                    <!-- 板块2: 分成一块 (整块，但轮廓为六角梯形混合) 展示两人共同亮点 -->
                    <div class="block block-single">
                        <div class="together-showcase">
                            <div class="together-text">
                                <h2>📻 日常声场 · 共同计划</h2>
                                <p>「杰宁漫谈」播客持续更新中，分享技术、设计与双城烟火气。</p>
                                <p>✨ 两人食记地图已记录128家街角美味 · 开源组件库800+星标</p>
                                <div style="display: flex; gap: 1rem; margin-top: 0.5rem;">
                                    <span style="background:#f0e5d8; padding:0.2rem 0.8rem; border-radius:30px;">🎙️ 第三季录制中</span>
                                    <span style="background:#f0e5d8; padding:0.2rem 0.8rem; border-radius:30px;">📸 城市速写本计划</span>
                                </div>
                            </div>
                            <div class="together-stats">
                                <div style="font-size:2rem;">🍻</div>
                                <div><strong>两人日常</strong><br>联合企划 #24节气展</div>
                                <div style="margin-top:8px;">🏆 创新文化资助项目</div>
                            </div>
                        </div>
                    </div>

                    <!-- 板块3: 分成两块 (左块展示邓杰精选，右块展示王泊宁精选，不规则梯形&平行四边形) -->
                    <div class="block-split-2">
                        <div class="dual-left" data-nav="dengjie">
                            <div class="profile-mini">
                                <h3>🌿 邓杰 · 日常切片</h3>
                                <div class="hobby-list">
                                    <span class="hobby-badge">📷 胶片暗房</span>
                                    <span class="hobby-badge">☕ 手冲实验室</span>
                                    <span class="hobby-badge">🚴 城市骑行</span>
                                </div>
                                <p style="font-size:0.85rem;">“最近和王泊宁一起冲洗胶卷，记录双城光影日记”</p>
                                <div class="btn-detail" data-nav="dengjie">🔍 查看完整日常 →</div>
                            </div>
                        </div>
                        <div class="dual-right" data-nav="wangboning">
                            <div class="profile-mini">
                                <h3>🎨 王泊宁 · 灵感手记</h3>
                                <div class="hobby-list">
                                    <span class="hobby-badge">🎨 数字插画</span>
                                    <span class="hobby-badge">🎙️ 播客录制</span>
                                    <span class="hobby-badge">🏂 滑雪季</span>
                                </div>
                                <p style="font-size:0.85rem;">“和邓杰摆创意市集，贩卖手冲咖啡与自制zine”</p>
                                <div class="btn-detail" data-nav="wangboning">🔍 查看完整日常 →</div>
                            </div>
                        </div>
                    </div>
                    <div style="text-align: center; font-size:0.75rem; color:#7f8c9a; margin-top: 0.5rem;">
                        🧩 每一个不规则板块，都是日常的形状 — 三角形、梯形、多边形，交织成两人宇宙
                    </div>
                </div>
            `;
        }

        // 详情页渲染（同样带不规则感但干净）
        function renderDetail(personId) {
            let data;
            let titleExtra = "";
            if (personId === 'dengjie') {
                data = dengjieDetail;
                titleExtra = "🌿 邓杰的日常 · 不规则光谱";
            } else if (personId === 'wangboning') {
                data = wangboningDetail;
                titleExtra = "🎨 王泊宁的日常 · 不规则灵感";
            } else {
                data = togetherDetail;
                titleExtra = "✨ 两人的共同日常 · 不规则共生";
            }

            const isTogether = personId === 'together';
            const hobbyList = data.hobby ? data.hobby.map(h => `<span class="hobby-badge" style="background:#eef3fc;">${h}</span>`).join('') : 
                            (isTogether ? `<span class="hobby-badge">🤝 共创手作</span><span class="hobby-badge">🎙️ 双人播客</span><span class="hobby-badge">🚗 公路旅行</span>` : 
                            `<span class="hobby-badge">✨ 日常探索</span>`);
            
            let extraSection = '';
            if (!isTogether) {
                extraSection = `
                    <div class="info-card">
                        <strong>🌟 双人联结：</strong> ${personId === 'dengjie' ? '与王泊宁一起维护「两人咖啡馆地图」，探访超过50家独立咖啡馆。' : '与邓杰每月举办「两人日常分享会」，线上线下灵感交换。'}
                    </div>
                `;
            } else {
                extraSection = `
                    <div class="info-card">
                        <strong>🌈 共同信条：</strong> 「创造让彼此发光的瞬间，日常即庆典。」<br>
                        📌 正在进行：「两人日常·第三季」播客 & 城市速写本计划。
                    </div>
                `;
            }

            let projectHtml = '';
            if (isTogether) {
                projectHtml = `<div class="info-card"><strong>🚀 共同里程碑：</strong> ${data.highlight ? data.highlight.join(' · ') : '开源组件库 800+ Star · 两人食记5w+粉丝 · 节气展双城联动'}</div>`;
            } else {
                projectHtml = `<div class="info-card"><strong>📌 代表项目：</strong> ${data.project}</div>`;
            }

            return `
                <div class="detail-container">
                    <div style="margin-bottom: 1.5rem;">
                        <button class="back-home-btn" id="backToIndexBtn">← 返回首页 · 三个不规则版块</button>
                    </div>
                    <div class="detail-header">
                        <h1>${data.name}</h1>
                        <p style="color: #d28b46;">${titleExtra}</p>
                        <p style="color: #4f6f8f;">${data.role || ''}</p>
                    </div>
                    <div class="info-grid">
                        <div class="info-card"><strong>📖 日常自述</strong><br>${data.bio}</div>
                        <div class="info-card"><strong>🎯 兴趣爱好 / 碎片</strong><br><div class="hobby-list" style="margin-top: 6px;">${hobbyList}</div></div>
                        ${projectHtml}
                        <div class="info-card"><strong>✨ 日常语录</strong><br>“${data.quote || (isTogether ? '每个月有一天“离线日”，一起徒步、写生或发呆。' : '最近沉迷与伙伴共创日常奇迹。')}”</div>
                        ${extraSection}
                    </div>
                    <footer style="text-align: center; margin-top: 2rem; font-size:0.7rem; color:#8fa0b5;">
                        &copy; 2026 不规则日常 · 邓杰 & 王泊宁  | 三角形·梯形·多边形交织的叙事
                    </footer>
                </div>
            `;
        }

        // 渲染主函数
        function renderApp() {
            const appDiv = document.getElementById('app');
            if (!appDiv) return;

            if (currentPage === 'index') {
                appDiv.innerHTML = renderIndex();
                // 绑定所有不规则块中的导航事件 (包括三块卡片，以及板块3内的按钮)
                const dengjieTriggers = document.querySelectorAll('[data-nav="dengjie"]');
                const wangboningTriggers = document.querySelectorAll('[data-nav="wangboning"]');
                const togetherTriggers = document.querySelectorAll('[data-nav="together"]');
                
                const goTo = (page) => {
                    currentPage = page;
                    renderApp();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                dengjieTriggers.forEach(el => el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    goTo('dengjie');
                }));
                wangboningTriggers.forEach(el => el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    goTo('wangboning');
                }));
                togetherTriggers.forEach(el => el.addEventListener('click', (e) => {
                    e.stopPropagation();
                    goTo('together');
                }));
            } 
            else if (currentPage === 'dengjie') {
                appDiv.innerHTML = renderDetail('dengjie');
                const backBtn = document.getElementById('backToIndexBtn');
                if (backBtn) backBtn.addEventListener('click', () => { currentPage = 'index'; renderApp(); });
            }
            else if (currentPage === 'wangboning') {
                appDiv.innerHTML = renderDetail('wangboning');
                const backBtn = document.getElementById('backToIndexBtn');
                if (backBtn) backBtn.addEventListener('click', () => { currentPage = 'index'; renderApp(); });
            }
            else if (currentPage === 'together') {
                appDiv.innerHTML = renderDetail('together');
                const backBtn = document.getElementById('backToIndexBtn');
                if (backBtn) backBtn.addEventListener('click', () => { currentPage = 'index'; renderApp(); });
            }
        }

        // 启动
        currentPage = 'index';
        renderApp();
    </script>
</body>
</html>
