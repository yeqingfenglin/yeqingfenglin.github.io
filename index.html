<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>日常集 · 动态专栏版 | 邓杰 & 王泊宁</title>
    <style>
        /* ========== 样式 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; line-height: 1.5; color: #1e2a3e; background: #f1f5f9; min-height: 100vh; }
        .app-container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }
        .create-post-btn { position: fixed; top: 20px; right: 20px; z-index: 1000; background: #1e3c4c; color: white; padding: 10px 20px; border-radius: 50px; font-size: 0.9rem; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s; font-weight: 600; cursor: pointer; border: none; }
        .create-post-btn:hover { background: #e6a157; transform: translateY(-2px); }
        .section-link { position: absolute; top: 12px; right: 16px; text-decoration: none; font-size: 1.2rem; color: #cbd5e1; transition: 0.3s; font-weight: bold; background: rgba(255,255,240,0.6); border-radius: 30px; width: 28px; height: 28px; display: inline-flex; align-items: center; justify-content: center; cursor: pointer; }
        .section-link:hover { color: #e6a157; transform: scale(1.2); background: white; }
        .hero-index { min-height: 85vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; background: linear-gradient(135deg, #fef9f0 0%, #eef2ff 100%); border-radius: 2.5rem; box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1); padding: 2.5rem 1.8rem; }
        .greeting-tag { font-size: 1rem; letter-spacing: 3px; color: #4b6589; background: rgba(255,255,240,0.7); backdrop-filter: blur(2px); padding: 0.2rem 1rem; border-radius: 40px; display: inline-block; margin-bottom: 1rem; }
        .main-headline { font-size: 3rem; font-weight: 800; background: linear-gradient(125deg, #1e3c4c, #2c6e9e, #e6a157); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 0.5rem; }
        .subhead { color: #5d6f8f; margin-bottom: 3rem; border-bottom: 1px solid #cddfe7; padding-bottom: 0.5rem; display: inline-block; font-weight: 500; }
        .triple-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; margin: 2rem 0 1.5rem; }
        .daily-card { background: white; width: 250px; padding: 1.8rem 1.2rem; border-radius: 2rem; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 0.8rem; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid rgba(210,225,245,0.6); cursor: pointer; }
        .daily-card:hover { transform: translateY(-8px); box-shadow: 0 25px 35px -12px rgba(0,0,0,0.2); }
        .card-icon { font-size: 3.6rem; background: #f0f4fe; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; border-radius: 50%; }
        .card-name { font-size: 1.8rem; font-weight: 700; color: #1f3b4c; }
        .card-desc { font-size: 0.8rem; color: #5f7f9e; background: #f5f9ff; padding: 0.2rem 0.8rem; border-radius: 30px; }
        .detail-page { max-width: 1100px; margin: 0 auto; }
        .back-home-bar { margin-bottom: 2rem; }
        .back-home-btn { display: inline-flex; align-items: center; gap: 8px; background: #eef2ff; padding: 0.5rem 1.5rem; border-radius: 40px; font-size: 0.9rem; font-weight: 500; color: #1e4a76; cursor: pointer; border: none; }
        .irregular-stack { display: flex; flex-direction: column; gap: 2rem; }
        .block-split-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; }
        .shape-card { background: white; padding: 1.8rem 1.2rem; box-shadow: 0 8px 18px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; }
        .shape-triangle-left { clip-path: polygon(0% 0%, 100% 0%, 85% 100%, 0% 100%); border-radius: 1.5rem 0 0 1.5rem; margin-right: -6px; z-index: 2; }
        .shape-trapezoid-mid { clip-path: polygon(6% 0%, 94% 0%, 100% 100%, 0% 100%); margin: 0 -6px; z-index: 3; }
        .shape-reverse-triangle { clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%); border-radius: 0 1.5rem 1.5rem 0; margin-left: -6px; }
        .block-icon { font-size: 2.6rem; margin-bottom: 0.6rem; }
        .block-single { background: linear-gradient(125deg, #fff8ef, #ffffff); padding: 2rem; clip-path: polygon(4% 0%, 96% 0%, 100% 15%, 100% 85%, 96% 100%, 4% 100%, 0% 85%, 0% 15%); border-radius: 2rem 1rem 2rem 1rem; position: relative; }
        .single-content { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1.5rem; }
        .single-stats { flex: 1; background: #f7efe3; padding: 1rem; border-radius: 1.5rem; text-align: center; }
        .block-split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .dual-left, .dual-right { background: white; padding: 1.8rem; position: relative; border-radius: 1rem; }
        .hobby-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.8rem 0; }
        .hobby-badge { background: #eef3fc; padding: 0.2rem 0.8rem; border-radius: 30px; font-size: 0.75rem; }
        
        /* ========== 全新专栏页面：从上到下展示所有文章 ========== */
        .column-fullpage { max-width: 900px; margin: 0 auto; }
        .column-header-section { text-align: center; margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 2px solid #e2e8f0; }
        .column-header-section h1 { font-size: 2.2rem; color: #1e3c4c; margin-bottom: 0.5rem; }
        .column-header-section .column-desc { color: #6c8dae; font-size: 0.9rem; }
        .column-stats { background: #eef2ff; padding: 0.8rem 1.5rem; border-radius: 40px; display: inline-block; margin-top: 1rem; font-size: 0.85rem; }
        .articles-list { display: flex; flex-direction: column; gap: 2rem; }
        .article-item-full {
            background: white;
            border-radius: 1.5rem;
            padding: 1.8rem;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
            transition: all 0.3s ease;
            border: 1px solid #eef2ff;
        }
        .article-item-full:hover { transform: translateY(-3px); box-shadow: 0 12px 28px rgba(0,0,0,0.1); }
        .article-title-full { font-size: 1.6rem; font-weight: 700; color: #1e3c4c; margin-bottom: 0.5rem; }
        .article-meta-full { display: flex; gap: 1.5rem; margin-bottom: 1rem; padding-bottom: 0.75rem; border-bottom: 1px dashed #e2e8f0; color: #8ba0bc; font-size: 0.85rem; }
        .article-content-full { font-size: 1rem; line-height: 1.7; color: #334e68; }
        .article-content-full img { max-width: 100%; border-radius: 1rem; margin: 1rem 0; }
        .article-content-full p { margin-bottom: 1rem; }
        .empty-column { text-align: center; padding: 3rem; background: #faf9fe; border-radius: 2rem; color: #7c8ba0; }
        .back-to-home { margin-bottom: 1.5rem; }
        
        #editor-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; backdrop-filter: blur(5px); }
        .editor-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 90%; max-width: 650px; padding: 2rem; border-radius: 1.5rem; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 0.8rem; }
        .form-group textarea { height: 180px; resize: vertical; }
        .submit-btn { background: #2c6e9e; color: white; border: none; padding: 1rem; width: 100%; border-radius: 0.8rem; cursor: pointer; font-weight: bold; margin-top: 0.5rem; }
        .submit-btn.cancel { background: #94a3b8; }
        .loading { text-align: center; padding: 2rem; color: #6c8dae; }
        .upload-guide { background: #e6f7e6; padding: 12px; margin-top: 12px; border-radius: 8px; font-size: 0.8rem; display: none; border-left: 4px solid #2c6e9e; }
        @media (max-width: 780px) {
            .block-split-3 { grid-template-columns: 1fr; gap: 1rem; }
            .shape-triangle-left, .shape-trapezoid-mid, .shape-reverse-triangle { clip-path: none; border-radius: 1.5rem; margin: 0; }
            .block-split-2 { grid-template-columns: 1fr; }
            .article-title-full { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
    <button class="create-post-btn" onclick="openEditor()">✍️ 创作文章</button>
    <div id="app-root" class="app-container"><div class="loading">📡 正在加载...</div></div>

    <div id="editor-overlay">
        <div class="editor-modal">
            <h2 style="margin-bottom:1.2rem;">📝 新建专栏文章</h2>
            <div class="form-group">
                <label>📌 归属板块</label>
                <select id="post-target">
                    <optgroup label="邓杰的日常 → posts/dengjie/">
                        <option value="dengjie-b1-1" data-folder="dengjie">胶片暗房</option>
                        <option value="dengjie-b1-2" data-folder="dengjie">手冲哲学</option>
                        <option value="dengjie-b1-3" data-folder="dengjie">骑行漫游</option>
                        <option value="dengjie-b2-1" data-folder="dengjie">近期日常</option>
                        <option value="dengjie-b3-L" data-folder="dengjie">技能热爱</option>
                        <option value="dengjie-b3-R" data-folder="dengjie">双人联结</option>
                    </optgroup>
                    <optgroup label="王泊宁的日常 → posts/wangboning/">
                        <option value="wang-b1-1" data-folder="wangboning">数字插画</option>
                        <option value="wang-b1-2" data-folder="wangboning">播客宇宙</option>
                        <option value="wang-b1-3" data-folder="wangboning">雪山灵感</option>
                        <option value="wang-b2-1" data-folder="wangboning">创作现场</option>
                        <option value="wang-b3-L" data-folder="wangboning">创意工具</option>
                        <option value="wang-b3-R" data-folder="wangboning">日常共振</option>
                    </optgroup>
                    <optgroup label="两人的共同日常 → posts/together/">
                        <option value="both-b1-1" data-folder="together">开源协作</option>
                        <option value="both-b1-2" data-folder="together">两人食记</option>
                        <option value="both-b1-3" data-folder="together">杰宁漫谈</option>
                        <option value="both-b2-1" data-folder="together">共同里程碑</option>
                        <option value="both-b3-L" data-folder="together">共同兴趣</option>
                        <option value="both-b3-R" data-folder="together">未来计划</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group"><label>📖 标题 (20字以内)</label><input type="text" id="post-title" maxlength="20" placeholder="例如：暗房冲洗新体验"></div>
            <div class="form-group"><label>✍️ 作者</label><input type="text" id="post-author" placeholder="邓杰 / 王泊宁"></div>
            <div class="form-group"><label>📄 正文 (支持HTML/图片)</label><textarea id="post-content" placeholder="支持HTML，图片用 &lt;img src='assets/images/xxx.jpg'&gt;"></textarea></div>
            <button class="submit-btn" onclick="publishAndDownload()">✨ 发布并下载JSON文件</button>
            <div id="upload-guide" class="upload-guide"></div>
            <button class="submit-btn cancel" onclick="closeEditor()">取消</button>
        </div>
    </div>

    <script>
        // ========== GitHub配置（已为您填好）==========
        const GITHUB_CONFIG = {
            owner: "yeqingfenglin",
            repo: "yeqingfenglin.github.io",
            branch: "main"
        };
        
        // 静态人物数据 (保持原有风格)
        const personsData = {
            dengjie: { id: 'dengjie', name: '邓杰', titleNote: '🌿 邓杰的日常', roleDesc: '全栈工程师 · 光影收集者',
                block1Items: [
                    { icon: "📷", title: "胶片暗房", desc: "每周冲洗黑白胶卷", blockId: "dengjie-b1-1" },
                    { icon: "☕", title: "手冲哲学", desc: "探访独立咖啡馆", blockId: "dengjie-b1-2" },
                    { icon: "🚴", title: "骑行漫游", desc: "单车丈量街巷", blockId: "dengjie-b1-3" }
                ],
                singleTitle: "📻 近期日常", singleDesc: "与王泊宁共同维护「两人食光机」小程序", singleStat: "🎞️ 胶片计划", singleBlockId: "dengjie-b2-1",
                leftTitle: "🎯 技能与热爱", leftHobbies: ["React", "摄影后期"], leftQuote: "代码是逻辑的诗", leftBlockId: "dengjie-b3-L",
                rightTitle: "🤝 双人联结", rightHobbies: ["咖啡地图", "播客"], rightQuote: "日常即灵感", rightBlockId: "dengjie-b3-R"
            },
            wangboning: { id: 'wangboning', name: '王泊宁', titleNote: '🎨 王泊宁的日常', roleDesc: '创意开发 · 设计思维',
                block1Items: [
                    { icon: "🎨", title: "数字插画", desc: "创作城市系列插画", blockId: "wang-b1-1" },
                    { icon: "🎙️", title: "播客宇宙", desc: "播放15w+", blockId: "wang-b1-2" },
                    { icon: "🏂", title: "雪山灵感", desc: "滑雪与动效", blockId: "wang-b1-3" }
                ],
                singleTitle: "🎬 创作现场", singleDesc: "筹备24节气日常展", singleStat: "播客第三季", singleBlockId: "wang-b2-1",
                leftTitle: "✨ 创意工具箱", leftHobbies: ["Figma", "GSAP"], leftQuote: "设计让日常发光", leftBlockId: "wang-b3-L",
                rightTitle: "💞 日常共振", rightHobbies: ["市集摊主", "读书会"], rightQuote: "平凡日子过成展览", rightBlockId: "wang-b3-R"
            },
            together: { id: 'together', name: '邓杰 & 王泊宁', titleNote: '✨ 两人的共同日常', roleDesc: '生活合伙人',
                block1Items: [
                    { icon: "🤝", title: "开源协作", desc: "Daily Components", blockId: "both-b1-1" },
                    { icon: "🍜", title: "两人食记", desc: "美食IP", blockId: "both-b1-2" },
                    { icon: "🎙️", title: "杰宁漫谈", desc: "双人播客", blockId: "both-b1-3" }
                ],
                singleTitle: "📌 共同里程碑", singleDesc: "完成30+场黑客马拉松", singleStat: "双城联展", singleBlockId: "both-b2-1",
                leftTitle: "🌈 共同兴趣", leftHobbies: ["公路旅行", "双人厨艺"], leftQuote: "一起发呆或徒步", leftBlockId: "both-b3-L",
                rightTitle: "🌱 未来计划", rightHobbies: ["两人小报", "工作坊"], rightQuote: "记录日常微光", rightBlockId: "both-b3-R"
            }
        };
        
        // 文章存储 (key: blockId, value: 文章数组)
        let postsDB = new Map();
        
        // 从GitHub加载所有文章
        async function loadAllPostsFromGitHub() {
            const folders = ['dengjie', 'wangboning', 'together'];
            const allPosts = new Map();
            
            for (const folder of folders) {
                const apiUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/posts/${folder}?ref=${GITHUB_CONFIG.branch}`;
                try {
                    const response = await fetch(apiUrl);
                    if (response.ok) {
                        const files = await response.json();
                        for (const file of files) {
                            if (file.name.endsWith('.json')) {
                                const contentRes = await fetch(file.download_url);
                                const postData = await contentRes.json();
                                const blockId = postData.meta?.blockId || postData.targetBlock;
                                if (blockId) {
                                    if (!allPosts.has(blockId)) allPosts.set(blockId, []);
                                    allPosts.get(blockId).push({
                                        id: file.name,
                                        title: postData.meta?.title || postData.title,
                                        author: postData.meta?.author || postData.author,
                                        content: postData.body || postData.content,
                                        date: postData.meta?.date || postData.date,
                                        rawContent: postData.body || postData.content
                                    });
                                }
                            }
                        }
                    }
                } catch(e) { console.log(`加载${folder}失败:`, e); }
            }
            // 按日期排序（新的在前）
            for (let [key, arr] of allPosts.entries()) {
                arr.sort((a,b) => (b.date || '').localeCompare(a.date || ''));
            }
            return allPosts;
        }
        
        // 发布文章 - 下载JSON文件
        function publishAndDownload() {
            const selectEl = document.getElementById('post-target');
            const selectedOption = selectEl.options[selectEl.selectedIndex];
            const target = selectEl.value;
            const folder = selectedOption.dataset.folder;
            const title = document.getElementById('post-title').value.trim();
            const author = document.getElementById('post-author').value.trim();
            const content = document.getElementById('post-content').value;
            
            if (!title || !author || !content) { alert("请填写完整：标题、作者和正文内容"); return; }
            
            const date = new Date().toISOString().split('T')[0];
            const slug = title.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '').slice(0, 20);
            const fileName = `${date}_${slug || 'post'}.json`;
            const fullPath = `posts/${folder}/${fileName}`;
            
            const articleJSON = {
                meta: { title, author, date, blockId: target, owner: folder, images: [] },
                body: content,
                raw: { title, author, content, date, targetBlock: target }
            };
            
            const jsonStr = JSON.stringify(articleJSON, null, 2);
            
            // 下载文件
            const blob = new Blob([jsonStr], {type: 'application/json'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
            URL.revokeObjectURL(link.href);
            
            // 显示上传指引
            const guide = document.getElementById('upload-guide');
            guide.style.display = 'block';
            guide.innerHTML = `
                <strong>✅ JSON文件已下载！</strong><br><br>
                📁 <strong>请按以下步骤上传到GitHub：</strong><br><br>
                1️⃣ 打开 <a href="https://github.com/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/tree/main/posts/${folder}" target="_blank">GitHub仓库 posts/${folder}/ 文件夹</a><br>
                2️⃣ 点击 <strong>Add file → Upload files</strong><br>
                3️⃣ 选择刚下载的 <strong>${fileName}</strong> 文件<br>
                4️⃣ 滚动到底部，点击 <strong>Commit changes</strong><br>
                5️⃣ 等待几秒后 <strong>刷新本页面</strong> 即可看到新文章！<br><br>
                💡 图片请放入 <code>assets/images/</code> 目录，正文中用相对路径引用
            `;
            
            // 清空表单
            document.getElementById('post-title').value = '';
            document.getElementById('post-author').value = '';
            document.getElementById('post-content').value = '';
            
            setTimeout(() => { guide.style.display = 'none'; }, 15000);
        }
        
        function getPostsByBlock(blockId) { return postsDB.get(blockId) || []; }
        
        // 路由
        let currentPage = 'index';
        let currentPageDetail = null;
        
        // ========== 新版专栏页面：从上到下展示所有文章 ==========
        function renderColumnFullPage(blockId, blockTitle) {
            const posts = getPostsByBlock(blockId);
            const folder = blockId.includes('dengjie') ? 'dengjie' : (blockId.includes('wang') ? 'wangboning' : 'together');
            
            if (posts.length === 0) {
                return `
                    <div class="column-fullpage">
                        <div class="back-to-home">
                            <button class="back-home-btn" onclick="backToDetail()">← 返回主页</button>
                        </div>
                        <div class="column-header-section">
                            <h1>📂 ${escapeHtml(blockTitle)}</h1>
                            <div class="column-desc">记录专属日常，每次创作都是星轨延伸</div>
                            <div class="column-stats">✨ 暂无文章</div>
                        </div>
                        <div class="empty-column">
                            ✨ 暂无文章，请点击右下角「创作文章」发布 ✨
                        </div>
                    </div>
                `;
            }
            
            // 从上到下展示所有文章
            const articlesHtml = posts.map(post => `
                <div class="article-item-full">
                    <div class="article-title-full">${escapeHtml(post.title)}</div>
                    <div class="article-meta-full">
                        <span>✍️ ${escapeHtml(post.author)}</span>
                        <span>📅 ${post.date || '未知日期'}</span>
                    </div>
                    <div class="article-content-full">
                        ${post.content || '内容加载中...'}
                    </div>
                </div>
            `).join('');
            
            return `
                <div class="column-fullpage">
                    <div class="back-to-home">
                        <button class="back-home-btn" onclick="backToDetail()">← 返回主页</button>
                    </div>
                    <div class="column-header-section">
                        <h1>📂 ${escapeHtml(blockTitle)}</h1>
                        <div class="column-desc">记录专属日常 · 从上到下阅览全部文章</div>
                        <div class="column-stats">📄 共 ${posts.length} 篇文章</div>
                    </div>
                    <div class="articles-list">
                        ${articlesHtml}
                    </div>
                </div>
            `;
        }
        
        async function renderApp() {
            const root = document.getElementById('app-root');
            if (currentPage === 'index') {
                root.innerHTML = `<div class="hero-index"><div class="greeting-tag">✦ 双人宇宙 ✦</div><div class="main-headline">邓杰 · 王泊宁<br>两人的日常</div><div class="subhead">独立轨迹 · 交叠星光</div><div class="triple-links"><div class="daily-card" data-person="dengjie"><div class="card-icon">🌿</div><div class="card-name">邓杰的日常</div><div class="card-desc">全栈 · 光影收集者</div></div><div class="daily-card" data-person="wangboning"><div class="card-icon">🎨</div><div class="card-name">王泊宁的日常</div><div class="card-desc">创意开发 · 设计思维</div></div><div class="daily-card" data-person="together"><div class="card-icon">✨🤝✨</div><div class="card-name">两人的共同日常</div><div class="card-desc">共同项目 · 双城灵感</div></div></div><div class="footer-note">点击卡片进入 · 文章自动从GitHub加载 ✨</div></div>`;
                document.querySelectorAll('.daily-card').forEach(card => {
                    card.addEventListener('click', () => { currentPage = card.dataset.person; currentPageDetail = null; renderApp(); });
                });
            } 
            else if (currentPage === 'column') {
                const blockId = window._tempBlockId;
                const blockTitle = window._tempBlockTitle;
                root.innerHTML = renderColumnFullPage(blockId, blockTitle);
            } 
            else {
                const data = personsData[currentPage];
                if (data) {
                    const block1Html = `<div class="block-split-3">${data.block1Items.map((item, i) => `<div class="shape-card ${i===0?'shape-triangle-left':i===1?'shape-trapezoid-mid':'shape-reverse-triangle'}"><a class="section-link" onclick="navigateToColumn('${item.blockId}','${item.title}')">↗</a><div class="block-icon">${item.icon}</div><h3>${item.title}</h3><p>${item.desc}</p></div>`).join('')}</div>`;
                    const block2Html = `<div class="block-single"><a class="section-link" onclick="navigateToColumn('${data.singleBlockId}','${data.singleTitle}')">↗</a><div class="single-content"><div><h2>${data.singleTitle}</h2><p>${data.singleDesc}</p></div><div class="single-stats">✨ ${data.singleStat}</div></div></div>`;
                    const block3Html = `<div class="block-split-2"><div class="dual-left"><a class="section-link" onclick="navigateToColumn('${data.leftBlockId}','${data.leftTitle}')">↗</a><h3>${data.leftTitle}</h3><div class="hobby-list">${data.leftHobbies.map(h=>`<span class="hobby-badge">${h}</span>`).join('')}</div><p>“${data.leftQuote}”</p></div><div class="dual-right"><a class="section-link" onclick="navigateToColumn('${data.rightBlockId}','${data.rightTitle}')">↗</a><h3>${data.rightTitle}</h3><div class="hobby-list">${data.rightHobbies.map(h=>`<span class="hobby-badge">${h}</span>`).join('')}</div><p>“${data.rightQuote}”</p></div></div>`;
                    root.innerHTML = `<div class="detail-page"><div class="back-home-bar"><button class="back-home-btn" id="back-to-index">← 返回首页</button></div><div style="text-align:center;margin-bottom:1rem;"><h1>${data.name}</h1><div>${data.titleNote}</div><div style="color:#6c8dae;">${data.roleDesc}</div></div><div class="irregular-stack">${block1Html}${block2Html}${block3Html}</div><div class="detail-footer" style="text-align:center;margin-top:2rem;font-size:0.75rem;color:#8ba0bc;">点击 ↗ 进入专栏 · 文章从上到下完整展示</div></div>`;
                    document.getElementById('back-to-index')?.addEventListener('click', () => { currentPage = 'index'; renderApp(); });
                }
            }
        }
        
        function navigateToColumn(blockId, blockTitle) { 
            currentPageDetail = currentPage; 
            currentPage = 'column'; 
            window._tempBlockId = blockId; 
            window._tempBlockTitle = blockTitle; 
            renderApp(); 
        }
        
        function backToDetail() { 
            if (currentPageDetail) { 
                currentPage = currentPageDetail; 
                currentPageDetail = null; 
                renderApp(); 
            } else { 
                currentPage = 'index'; 
                renderApp(); 
            } 
        }
        
        function escapeHtml(str) { 
            if(!str) return ''; 
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
        }
        
        function openEditor() { 
            document.getElementById('editor-overlay').style.display = 'block'; 
            document.getElementById('upload-guide').style.display = 'none'; 
        }
        
        function closeEditor() { document.getElementById('editor-overlay').style.display = 'none'; }
        
        // 初始化
        (async function init() {
            const root = document.getElementById('app-root');
            root.innerHTML = '<div class="loading">📡 正在从GitHub加载文章...</div>';
            postsDB = await loadAllPostsFromGitHub();
            renderApp();
        })();
    </script>
</body>
</html>
