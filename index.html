<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>日常集 · 动态专栏版 | 邓杰 & 王泊宁</title>
    <style>
        /* ========== 全局样式 & 复位 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.5;
            color: #1e2a3e;
            background: #f1f5f9;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
        }

        /* 创作按钮 (浮动) */
        .create-post-btn {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            background: #1e3c4c;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            transition: 0.3s;
            font-weight: 600;
            cursor: pointer;
            border: none;
        }
        .create-post-btn:hover { background: #e6a157; transform: translateY(-2px); }

        /* 板块内部链接跳转标识 (跳转到专栏聚合页) */
        .section-link {
            position: absolute;
            top: 12px;
            right: 16px;
            text-decoration: none;
            font-size: 1.2rem;
            color: #cbd5e1;
            transition: 0.3s;
            font-weight: bold;
            background: rgba(255,255,240,0.6);
            border-radius: 30px;
            width: 28px;
            height: 28px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .section-link:hover { color: #e6a157; transform: scale(1.2); background: white; }

        /* ========== 首页样式 ========== */
        .hero-index {
            min-height: 85vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: linear-gradient(135deg, #fef9f0 0%, #eef2ff 100%);
            border-radius: 2.5rem;
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1);
            padding: 2.5rem 1.8rem;
        }
        .greeting-tag { font-size: 1rem; letter-spacing: 3px; color: #4b6589; background: rgba(255,255,240,0.7); backdrop-filter: blur(2px); padding: 0.2rem 1rem; border-radius: 40px; display: inline-block; margin-bottom: 1rem; }
        .main-headline { font-size: 3rem; font-weight: 800; background: linear-gradient(125deg, #1e3c4c, #2c6e9e, #e6a157); background-clip: text; -webkit-background-clip: text; color: transparent; margin-bottom: 0.5rem; }
        .subhead { color: #5d6f8f; margin-bottom: 3rem; border-bottom: 1px solid #cddfe7; padding-bottom: 0.5rem; display: inline-block; font-weight: 500; }
        .triple-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; margin: 2rem 0 1.5rem; }
        .daily-card { background: white; width: 250px; padding: 1.8rem 1.2rem; border-radius: 2rem; transition: all 0.3s ease; display: flex; flex-direction: column; align-items: center; gap: 0.8rem; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border: 1px solid rgba(210,225,245,0.6); cursor: pointer; }
        .daily-card:hover { transform: translateY(-8px); box-shadow: 0 25px 35px -12px rgba(0,0,0,0.2); border-color: #bcd0e6; background: #ffffff; }
        .card-icon { font-size: 3.6rem; background: #f0f4fe; width: 90px; height: 90px; display: flex; align-items: center; justify-content: center; border-radius: 50%; transition: 0.2s; }
        .card-name { font-size: 1.8rem; font-weight: 700; color: #1f3b4c; }
        .card-desc { font-size: 0.8rem; color: #5f7f9e; background: #f5f9ff; padding: 0.2rem 0.8rem; border-radius: 30px; font-weight: 500; }
        .daily-note { font-size: 0.75rem; color: #a4b7ce; margin-top: 0.2rem; }

        /* ========== 不规则详情页 (原版块风格) ========== */
        .detail-page { max-width: 1100px; margin: 0 auto; }
        .back-home-bar { margin-bottom: 2rem; }
        .back-home-btn { display: inline-flex; align-items: center; gap: 8px; background: #eef2ff; padding: 0.5rem 1.5rem; border-radius: 40px; font-size: 0.9rem; font-weight: 500; color: #1e4a76; cursor: pointer; border: none; transition: 0.2s; }
        .back-home-btn:hover { background: #e1e9fc; transform: translateX(-4px); }
        .irregular-stack { display: flex; flex-direction: column; gap: 2rem; }
        .block-split-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 0; background: transparent; }
        .shape-card { background: white; padding: 1.8rem 1.2rem; transition: all 0.25s; box-shadow: 0 8px 18px rgba(0,0,0,0.06); display: flex; flex-direction: column; align-items: center; text-align: center; position: relative; cursor: default; }
        .shape-triangle-left { clip-path: polygon(0% 0%, 100% 0%, 85% 100%, 0% 100%); border-radius: 1.5rem 0 0 1.5rem; margin-right: -6px; z-index: 2; }
        .shape-trapezoid-mid { clip-path: polygon(6% 0%, 94% 0%, 100% 100%, 0% 100%); margin: 0 -6px; z-index: 3; box-shadow: 0 8px 20px rgba(0,0,0,0.08); }
        .shape-reverse-triangle { clip-path: polygon(15% 0%, 100% 0%, 100% 100%, 0% 100%); border-radius: 0 1.5rem 1.5rem 0; margin-left: -6px; }
        .block-icon { font-size: 2.6rem; margin-bottom: 0.6rem; }
        .block-single { background: linear-gradient(125deg, #fff8ef, #ffffff); padding: 2rem 2rem; clip-path: polygon(4% 0%, 96% 0%, 100% 15%, 100% 85%, 96% 100%, 4% 100%, 0% 85%, 0% 15%); border-radius: 2rem 1rem 2rem 1rem; box-shadow: 0 12px 24px rgba(0,0,0,0.05); position: relative; }
        .single-content { display: flex; flex-wrap: wrap; align-items: center; justify-content: space-between; gap: 1.5rem; }
        .single-stats { flex: 1; background: #f7efe3; padding: 1rem; border-radius: 1.5rem; text-align: center; clip-path: polygon(10% 0%, 90% 0%, 100% 25%, 90% 100%, 10% 100%, 0% 75%); }
        .block-split-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem; }
        .dual-left { background: #ffffff; padding: 1.8rem; clip-path: polygon(0% 0%, 92% 0%, 100% 20%, 100% 80%, 92% 100%, 0% 100%); border-radius: 1.8rem 0.5rem 1.8rem 0.5rem; transition: all 0.2s; position: relative; }
        .dual-right { background: #ffffff; padding: 1.8rem; clip-path: polygon(8% 0%, 100% 0%, 100% 80%, 92% 100%, 0% 100%, 0% 20%); border-radius: 0.5rem 1.8rem 0.5rem 1.8rem; position: relative; }
        .hobby-list { display: flex; flex-wrap: wrap; gap: 0.5rem; margin: 0.8rem 0; }
        .hobby-badge { background: #eef3fc; padding: 0.2rem 0.8rem; border-radius: 30px; font-size: 0.75rem; color: #2b5a7a; }

        /* 专栏文章卡片聚合页面 */
        .column-container { max-width: 1100px; margin: 0 auto; }
        .column-header { margin-bottom: 2rem; text-align: center; }
        .posts-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.8rem; margin-top: 1.5rem; }
        .post-card { background: white; border-radius: 1.5rem; padding: 1.5rem; box-shadow: 0 6px 12px rgba(0,0,0,0.05); transition: 0.2s; border: 1px solid #eef2ff; }
        .post-card:hover { transform: translateY(-4px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }
        .post-title { font-size: 1.4rem; font-weight: 700; color: #1e3c4c; margin-bottom: 0.3rem; }
        .post-meta { font-size: 0.75rem; color: #8ba0bc; margin-bottom: 0.8rem; display: flex; gap: 1rem; }
        .post-content-preview { font-size: 0.85rem; color: #334e68; line-height: 1.4; margin-bottom: 1rem; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; }
        .read-more { color: #e6a157; font-weight: 500; text-decoration: none; font-size: 0.8rem; }
        .empty-posts { text-align: center; padding: 3rem; background: #faf9fe; border-radius: 2rem; color: #7c8ba0; }

        /* 编辑器弹窗 */
        #editor-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 2000; backdrop-filter: blur(5px); }
        .editor-modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; width: 90%; max-width: 620px; padding: 2rem; border-radius: 1.5rem; max-height: 90vh; overflow-y: auto; }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 0.8rem; outline: none; font-family: inherit; }
        .form-group textarea { height: 180px; resize: vertical; }
        .submit-btn { background: #2c6e9e; color: white; border: none; padding: 1rem; width: 100%; border-radius: 0.8rem; cursor: pointer; font-weight: bold; margin-top: 0.5rem; }
        .submit-btn.cancel { background: #94a3b8; }

        @media (max-width: 780px) {
            .block-split-3 { grid-template-columns: 1fr; gap: 1rem; }
            .shape-triangle-left, .shape-trapezoid-mid, .shape-reverse-triangle { clip-path: none; border-radius: 1.5rem; margin: 0; }
            .block-split-2 { grid-template-columns: 1fr; }
            .dual-left, .dual-right { clip-path: none; border-radius: 1.5rem; }
            .block-single { clip-path: none; border-radius: 1.5rem; }
        }
    </style>
</head>
<body>
    <button class="create-post-btn" onclick="openEditor()">✍️ 创作文章</button>
    <div id="app-root" class="app-container"></div>

    <!-- 编辑器弹窗 -->
    <div id="editor-overlay">
        <div class="editor-modal">
            <h2 style="margin-bottom:1.2rem; color:#1e3c4c;">📝 新建专栏文章</h2>
            <div class="form-group">
                <label>📌 归属板块 (18路分支)</label>

                    <optgroup label="邓杰的日常">

                    </optgroup>
                    <optgroup label="王泊宁的日常">
                        <option value="wang-b1-1">版块1-左 (数字插画)</option>
                        <option value="wang-b1-2">版块1-中 (播客宇宙)</option>
                        <option value="wang-b1-3">版块1-右 (雪山灵感)</option>
                        <option value="wang-b2-1">版块2 (创作现场)</option>
                        <option value="wang-b3-L">版块3-左 (创意工具)</option>

                    </optgroup>
                    <optgroup label="两人的共同日常">
                        <option value="both-b1-1">版块1-左 (开源协作)</option>
                        <option value="both-b1-2">版块1-中 (两人食记)</option>
                        <option value="both-b1-3">版块1-右 (杰宁漫谈)</option>
                        <option value="both-b2-1">版块2 (共同里程碑)</option>
                        <option value="both-b3-L">版块3-左 (共同兴趣)</option>
                        <option value="both-b3-R">版块3-右 (未来计划)</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group">
                <label>📖 文章标题 (20字以内)</label>
                <input type="text" id="post-title" maxlength="20" placeholder="例如：暗房冲洗新体验">
            </div>
            <div class="form-group">
                <label>✍️ 作者 (署名)</label>
                <input type="text" id="post-author" maxlength="20" placeholder="邓杰 / 王泊宁 / 杰宁联合">
            </div>
            <div class="form-group">
                <label>📄 正文 (支持图片链接或纯文本)</label>
                <textarea id="post-content" placeholder="写下你的专栏内容，可以粘贴图片链接如：&lt;img src='图片url' style='max-width:100%'&gt;"></textarea>
            </div>
            <button class="submit-btn" onclick="generatePostAndStore()">✨ 发布文章 & 保存</button>
            <button class="submit-btn cancel" onclick="closeEditor()">取消</button>
        </div>
    </div>

    <script>
        // ========== 完整数据模型 (包含版块静态信息 + 动态文章库) ==========
        // 每个人的基础详情 (不规则版块文案)
        const personsData = {
            dengjie: {
                id: 'dengjie', name: '邓杰', titleNote: '🌿 邓杰的日常 · 不规则光谱', roleDesc: '全栈工程师 · 光影收集者',
                block1Items: [
                    { icon: "📷✨", title: "胶片暗房", desc: "每周冲洗黑白胶卷，记录城市肌理", blockId: "dengjie-b1-1" },
                    { icon: "☕📖", title: "手冲哲学", desc: "探访50+独立咖啡馆，编写风味笔记", blockId: "dengjie-b1-2" },
                    { icon: "🚴🎞️", title: "骑行漫游", desc: "用单车丈量街巷，拍摄光影日记", blockId: "dengjie-b1-3" }
                ],
                singleTitle: "📻 近期日常 · 高光切片", singleDesc: "与王泊宁共同维护「两人食光机」小程序，用户突破1.2w。主导前端架构重构，性能提升40%。业余沉迷复古暗房技术。", singleStat: "🎞️ 2025 胶片计划\n已拍摄36卷", singleBlockId: "dengjie-b2-1",
                leftTitle: "🎯 技能与热爱", leftHobbies: ["React/Vue 架构", "性能优化", "组件库设计", "摄影后期"], leftQuote: "代码是逻辑的诗，快门是光的容器。", leftBlockId: "dengjie-b3-L",
                rightTitle: "🤝 双人联结", rightHobbies: ["两人咖啡馆地图", "食光机联合创作", "播客常驻嘉宾"], rightQuote: "和王泊宁一起，日常即灵感。", rightBlockId: "dengjie-b3-R"
            },
            wangboning: {
                id: 'wangboning', name: '王泊宁', titleNote: '🎨 王泊宁的日常 · 不规则灵感', roleDesc: '创意开发 · 设计思维',
                block1Items: [
                    { icon: "🎨🖌️", title: "数字插画", desc: "创作城市系列插画，记录双城故事", blockId: "wang-b1-1" },
                    { icon: "🎙️📡", title: "播客宇宙", desc: "「杰宁漫谈」全平台播放15w+", blockId: "wang-b1-2" },
                    { icon: "🏂✨", title: "雪山灵感", desc: "滑雪与动效设计的跨界探索", blockId: "wang-b1-3" }
                ],
                singleTitle: "🎬 创作现场 · 正在进行", singleDesc: "和邓杰一起筹备「24节气日常展」互动装置，用代码+插画呈现节气之美。开源动效库下载量超2k。", singleStat: "🎙️ 播客第三季\n即将上线", singleBlockId: "wang-b2-1",
                leftTitle: "✨ 创意工具箱", leftHobbies: ["Figma/Procreate", "GSAP动画", "AI生成艺术", "Vlog剪辑"], leftQuote: "设计让日常发光，代码让想法流动。", leftBlockId: "wang-b3-L",
                rightTitle: "💞 日常共振", rightHobbies: ["两人市集摊主", "视觉设计顾问", "双人读书会"], rightQuote: "和邓杰一起，把平凡日子过成展览。", rightBlockId: "wang-b3-R"
            },
            together: {
                id: 'together', name: '邓杰 & 王泊宁', titleNote: '✨ 两人的共同日常 · 不规则共生', roleDesc: '生活合伙人 · 创意共同体',
                block1Items: [
                    { icon: "🤝🚀", title: "开源协作", desc: "Daily Components 累计800+ Star", blockId: "both-b1-1" },
                    { icon: "🍜🗺️", title: "两人食记", desc: "5w+粉丝的美食探索IP", blockId: "both-b1-2" },
                    { icon: "🎙️🌟", title: "杰宁漫谈", desc: "双人播客，分享技术与烟火", blockId: "both-b1-3" }
                ],
                singleTitle: "📌 共同里程碑 · 日常行星", singleDesc: "从大学社团搭档到生活创意伙伴，联合完成30+场黑客马拉松，获得两次创新奖项。共同发起「两人读书会」影响3000+同好。", singleStat: "🎉 2026 双城联展\n筹备中", singleBlockId: "both-b2-1",
                leftTitle: "🌈 共同兴趣", leftHobbies: ["公路旅行", "双人厨艺", "交换相机计划", "植物养护"], leftQuote: "每个月有一天离线日，一起发呆或徒步。", leftBlockId: "both-b3-L",
                rightTitle: "🌱 未来计划", rightHobbies: ["两人小报newsletter", "城市速写本", "创意工作坊"], rightQuote: "继续记录日常微光，创造更多共鸣。", rightBlockId: "both-b3-R"
            }
        };

        // 全局文章存储 (key: 板块id, value: 文章数组)
        let postsDB = new Map();

        // 从 localStorage 加载已有文章
        function loadPostsFromStorage() {
            const stored = localStorage.getItem("daily_columns_posts");
            if(stored) {
                try {
                    const parsed = JSON.parse(stored);
                    for(let [key, arr] of Object.entries(parsed)) {
                        postsDB.set(key, arr);
                    }
                } catch(e) {}
            }
            // 初始化一些示例文章 (让页面不空旷)
            if(!postsDB.has("dengjie-b1-1")) {
                postsDB.set("dengjie-b1-1", []);
                postsDB.set("wang-b1-2", []);
                postsDB.set("both-b2-1", []);
            }
            // 加几篇演示示例
            const demoPost = {
                id: Date.now()+"_demo",
                title: "📸 胶片里的夏日记忆",
                author: "邓杰",
                content: "最近用rolleiflex拍了一组老城区的黄昏，光影在暗房里慢慢浮现的感觉太奇妙了。<br><img src='https://picsum.photos/id/1015/400/200' style='max-width:100%; border-radius:12px; margin:8px 0'><br>胶片不死，只是慢慢显影。",
                date: new Date().toISOString().split('T')[0],
                target: "dengjie-b1-1"
            };
            const demoPost2 = {
                id: Date.now()+"_demo2",
                title: "🎙️ 播客新企划启动",
                author: "王泊宁",
                content: "新一季「杰宁漫谈」聚焦独立创作者，第一期邀请到开源插画师聊聊日常灵感。敬请期待！",
                date: new Date().toISOString().split('T')[0],
                target: "wang-b1-2"
            };
            if(postsDB.get("dengjie-b1-1")?.length === 0) postsDB.get("dengjie-b1-1").push(demoPost);
            if(postsDB.get("wang-b1-2")?.length === 0) postsDB.get("wang-b1-2").push(demoPost2);
            saveToLocalStorage();
        }
        function saveToLocalStorage() {
            const obj = {};
            for(let [k,v] of postsDB.entries()) obj[k] = v;
            localStorage.setItem("daily_columns_posts", JSON.stringify(obj));
        }

        function addPostToDB(targetId, postObj) {
            if(!postsDB.has(targetId)) postsDB.set(targetId, []);
            postsDB.get(targetId).unshift(postObj);
            saveToLocalStorage();
        }

        // 获取某板块文章列表
        function getPostsByBlock(blockId) {
            return postsDB.get(blockId) || [];
        }

        // 编辑器逻辑
        function openEditor() { document.getElementById('editor-overlay').style.display = 'block'; }
        function closeEditor() { document.getElementById('editor-overlay').style.display = 'none'; }
        function generatePostAndStore() {
            const target = document.getElementById('post-target').value;
            const title = document.getElementById('post-title').value.trim();
            const author = document.getElementById('post-author').value.trim();
            let content = document.getElementById('post-content').value;
            if(!title || !author || !content) { alert("请填写完整：标题、作者和正文内容"); return; }
            const date = new Date().toISOString().split('T')[0];
            const postId = Date.now() + "_" + Math.random().toString(36).substr(2, 6);
            const newPost = { id: postId, title, author, content, date, target };
            addPostToDB(target, newPost);
            alert(`✅ 文章「${title}」已发布到板块！可在对应详情页点击↗查看专栏文章。`);
            closeEditor();
            document.getElementById('post-title').value = '';
            document.getElementById('post-author').value = '';
            document.getElementById('post-content').value = '';
            // 如果当前处于某个详情页，刷新页面保持同步
            if(currentPage !== 'index' && currentPageDetail) {
                renderApp();
            }
        }

        // 路由状态
        let currentPage = 'index';
        let currentPageDetail = null; // 存储当前显示的person id

        // 渲染专栏聚合页 (展示某个板块所有文章)
        function renderColumnPage(blockId, blockTitle) {
            const posts = getPostsByBlock(blockId);
            const postsHtml = posts.length === 0 ? 
                `<div class="empty-posts">✨ 暂无文章，点击右下角「创作文章」为这个板块注入灵感 ✨</div>` :
                `<div class="posts-grid">${posts.map(post => `
                    <div class="post-card">
                        <div class="post-title">${escapeHtml(post.title)}</div>
                        <div class="post-meta"><span>✍️ ${escapeHtml(post.author)}</span> <span>📅 ${post.date}</span></div>
                        <div class="post-content-preview">${post.content.replace(/<[^>]*>/g, '').substring(0, 100)}...</div>
                        <a href="javascript:void(0)" onclick="alert('完整文章：\\n${escapeHtml(post.content.replace(/<[^>]*>/g, ''))}')" class="read-more">阅读全文 →</a>
                    </div>
                `).join('')}</div>`;
            return `
                <div class="column-container">
                    <div class="back-home-bar">
                        <button class="back-home-btn" onclick="backToDetail()">← 返回 ${getCurrentPersonName()} 主页</button>
                    </div>
                    <div class="column-header">
                        <h2 style="color:#1f4b6e;">📂 专栏文章 · ${escapeHtml(blockTitle)}</h2>
                        <p style="color:#6f8daf;">记录专属日常，每次创作都是星轨延伸</p>
                    </div>
                    ${postsHtml}
                </div>
            `;
        }

        function getCurrentPersonName() {
            if(currentPageDetail === 'dengjie') return '邓杰';
            if(currentPageDetail === 'wangboning') return '王泊宁';
            if(currentPageDetail === 'together') return '两人共同日常';
            return '主页';
        }
        function backToDetail() { 
            if(currentPageDetail) { currentPage = currentPageDetail; currentPageDetail = null; renderApp(); }
            else { currentPage = 'index'; renderApp(); }
        }

        // 渲染详情页 (不规则版块并且每个不规则卡片加上专栏跳转链接)
        function renderDetail(personId) {
            const data = personsData[personId];
            if (!data) return '<div>出错</div>';
            // 版块1 三块动态注入blockId映射
            const block1Html = `
                <div class="block-split-3">
                    ${data.block1Items.map((item, idx) => {
                        let shapeClass = idx === 0 ? "shape-triangle-left" : (idx === 1 ? "shape-trapezoid-mid" : "shape-reverse-triangle");
                        return `<div class="shape-card ${shapeClass}" style="position:relative;">
                                    <a href="javascript:void(0)" class="section-link" onclick="navigateToColumn('${item.blockId}', '${escapeAttr(item.title)}')">↗</a>
                                    <div class="block-icon">${item.icon}</div>
                                    <h3>${item.title}</h3>
                                    <p>${item.desc}</p>
                                </div>`;
                    }).join('')}
                </div>
            `;
            const block2Html = `
                <div class="block-single" style="position:relative;">
                    <a href="javascript:void(0)" class="section-link" onclick="navigateToColumn('${data.singleBlockId}', '${escapeAttr(data.singleTitle)}')">↗</a>
                    <div class="single-content">
                        <div class="single-text"><h2>${data.singleTitle}</h2><p>${data.singleDesc}</p></div>
                        <div class="single-stats"><div style="font-size:2rem;">✨</div><div style="font-weight:500;">${data.singleStat.replace(/\n/g, '<br>')}</div></div>
                    </div>
                </div>
            `;
            const block3Html = `
                <div class="block-split-2">
                    <div class="dual-left" style="position:relative;">
                        <a href="javascript:void(0)" class="section-link" onclick="navigateToColumn('${data.leftBlockId}', '${escapeAttr(data.leftTitle)}')">↗</a>
                        <div class="mini-profile"><h3>${data.leftTitle}</h3><div class="hobby-list">${data.leftHobbies.map(h => `<span class="hobby-badge">${h}</span>`).join('')}</div><p>“${data.leftQuote}”</p></div>
                    </div>
                    <div class="dual-right" style="position:relative;">
                        <a href="javascript:void(0)" class="section-link" onclick="navigateToColumn('${data.rightBlockId}', '${escapeAttr(data.rightTitle)}')">↗</a>
                        <div class="mini-profile"><h3>${data.rightTitle}</h3><div class="hobby-list">${data.rightHobbies.map(h => `<span class="hobby-badge">${h}</span>`).join('')}</div><p>“${data.rightQuote}”</p></div>
                    </div>
                </div>
            `;
            return `
                <div class="detail-page">
                    <div class="back-home-bar"><button class="back-home-btn" id="back-to-index">← 返回首页 · 三个超链接</button></div>
                    <div style="text-align: center; margin-bottom: 1.8rem;"><h1 style="font-size:2.3rem; color:#153e5a;">${data.name}</h1><div style="color:#d28b46;">${data.titleNote}</div><div style="color:#5c6f87;">${data.roleDesc}</div></div>
                    <div class="irregular-stack">${block1Html}${block2Html}${block3Html}</div>
                    <div class="detail-footer">© 2026 不规则日常 · 点击 ↗ 符号进入对应专栏板块 · 自由创作</div>
                </div>
            `;
        }

        function navigateToColumn(blockId, blockTitle) {
            // 暂存当前详情页面，以便返回
            if(currentPage !== 'index') currentPageDetail = currentPage;
            currentPage = 'column';
            window._tempBlockId = blockId;
            window._tempBlockTitle = blockTitle;
            renderApp();
        }

        function renderIndex() {
            return `
                <div class="hero-index">
                    <div class="greeting-tag">✦ 双人宇宙 ✦</div>
                    <div class="main-headline">邓杰 · 王泊宁<br>两人的日常</div>
                    <div class="subhead">独立轨迹 · 交叠星光</div>
                    <div class="triple-links">
                        <div class="daily-card" data-person="dengjie"><div class="card-icon">🌿</div><div class="card-name">邓杰的日常</div><div class="card-desc">全栈 · 光影收集者</div><div class="daily-note">📸 探店 & 胶片日记</div></div>
                        <div class="daily-card" data-person="wangboning"><div class="card-icon">🎨</div><div class="card-name">王泊宁的日常</div><div class="card-desc">创意开发 · 设计思维</div><div class="daily-note">🎙️ 播客 & 动效魔法</div></div>
                        <div class="daily-card" data-person="together"><div class="card-icon">✨🤝✨</div><div class="card-name">两人的共同日常</div><div class="card-desc">共同项目 · 双城灵感</div><div class="daily-note">📖 播客/食记/联合创作</div></div>
                    </div>
                    <div class="footer-note">点击卡片进入不规则版块世界 · 每个↗链接汇聚专栏文章</div>
                </div>
            `;
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        function escapeAttr(str) { return str.replace(/['"]/g, ''); }

        function renderApp() {
            const root = document.getElementById('app-root');
            if(currentPage === 'index') {
                root.innerHTML = renderIndex();
                document.querySelectorAll('.daily-card').forEach(card => {
                    const person = card.getAttribute('data-person');
                    card.addEventListener('click', () => { currentPage = person; currentPageDetail = null; renderApp(); });
                });
            } 
            else if(currentPage === 'column') {
                const blockId = window._tempBlockId;
                const blockTitle = window._tempBlockTitle;
                root.innerHTML = renderColumnPage(blockId, blockTitle);
            }
            else {
                const personId = currentPage;
                root.innerHTML = renderDetail(personId);
                const backBtn = document.getElementById('back-to-index');
                if(backBtn) backBtn.addEventListener('click', () => { currentPage = 'index'; renderApp(); });
            }
        }

        loadPostsFromStorage();
        renderApp();
    </script>
</body>
</html>
