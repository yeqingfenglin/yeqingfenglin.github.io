            right: 30px;

            }
        };
        
        // 文章存储
        let postsDB = new Map();
        let isLoading = false;
        
        // 监听专栏类型切换
        document.getElementById('post-type').addEventListener('change', function() {
            const isImageGallery = this.value === 'image-gallery';
            document.getElementById('article-fields').style.display = isImageGallery ? 'none' : 'block';
            document.getElementById('image-fields').style.display = isImageGallery ? 'block' : 'none';
        });
        
        // 获取指定文件夹内的所有图片（使用 jsDelivr CDN 加速）
        async function getImagesFromFolder(folderPath) {
            // 使用 jsDelivr CDN 获取文件列表（更稳定）
            const apiUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/${folderPath}?ref=${GITHUB_CONFIG.branch}`;
            try {
                const response = await fetch(apiUrl);
                if (response.ok) {
                    const files = await response.json();
                    // 如果返回的是数组（文件夹存在且有文件）
                    if (Array.isArray(files)) {
                        return files.filter(f => f.type === 'file' && f.name.match(/\.(jpg|jpeg|png|gif|webp|bmp|svg)$/i));
                    }
                } else if (response.status === 404) {
                    console.log(`文件夹不存在: ${folderPath}`);
                }
            } catch(e) { console.log('获取图片失败:', e); }
            return [];
        }
        
        // 从GitHub加载所有文章
        async function loadAllPostsFromGitHub() {
            const folders = ['dengjie', 'wangboning', 'together'];
            const allPosts = new Map();
            
            for (const folder of folders) {
                const apiUrl = `https://api.github.com/repos/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/contents/posts/${folder}?ref=${GITHUB_CONFIG.branch}`;
                try {
                    const response = await fetch(apiUrl);
                    if (response.ok) {
                        const files = await response.json();
                        if (Array.isArray(files)) {
                            for (const file of files) {
                                if (file.name.endsWith('.json') && file.type === 'file') {
                                    try {
                                        const contentRes = await fetch(file.download_url);
                                        const postData = await contentRes.json();
                                        // 兼容多种 JSON 格式
                                        const blockId = postData.blockId || 
                                                       (postData.meta && postData.meta.blockId) ||
                                                       (postData.raw && postData.raw.targetBlock);
                                        
                                        if (blockId) {
                                            if (!allPosts.has(blockId)) allPosts.set(blockId, []);
                                            allPosts.get(blockId).push({
                                                id: file.name,
                                                title: postData.title || (postData.meta && postData.meta.title) || (postData.raw && postData.raw.title) || '无标题',
                                                author: postData.author || (postData.meta && postData.meta.author) || (postData.raw && postData.raw.author) || '未知作者',
                                                date: postData.date || (postData.meta && postData.meta.date) || (postData.raw && postData.raw.date) || file.name.slice(0, 10),
                                                type: postData.type || (postData.meta && postData.meta.type) || 'article',
                                                content: postData.content || postData.body || (postData.raw && postData.raw.content) || '',
                                                imageFolder: postData.imageFolder || (postData.meta && postData.meta.imageFolder) || ''
                                            });
                                        }
                                    } catch(e) {
                                        console.log(`解析文件 ${file.name} 失败:`, e);
                                    }
                                }
                            }
                        }
                    } else if (response.status === 404) {
                        console.log(`posts/${folder} 文件夹不存在，已跳过`);
                    }
                } catch(e) { console.log(`加载${folder}失败:`, e); }
            }
            // 按日期排序
            for (let [key, arr] of allPosts.entries()) {
                arr.sort((a,b) => (b.date || '').localeCompare(a.date || ''));
            }
            return allPosts;
        }
        
        // 发布文章 - 下载JSON文件并复制到剪贴板
        async function publishAndDownload() {
            const selectEl = document.getElementById('post-target');
            const selectedOption = selectEl.options[selectEl.selectedIndex];
            const target = selectEl.value;
            const targetFolder = selectedOption.dataset.folder;
            const title = document.getElementById('post-title').value.trim();
            const author = document.getElementById('post-author').value.trim();
            const type = document.getElementById('post-type').value;
            
            if (!title || !author) { alert("请填写标题和作者"); return; }
            
            const date = new Date().toISOString().split('T')[0];
            const slug = title.replace(/[^\u4e00-\u9fa5a-zA-Z0-9]/g, '').slice(0, 20);
            const fileName = `${date}_${slug || 'post'}.json`;
            
            let articleJSON;
            let imageFolderFull = '';
            
            if (type === 'image-gallery') {
                const folderName = document.getElementById('image-folder-name').value.trim();
                if (!folderName) { alert("请填写图片文件夹名称"); return; }
                imageFolderFull = `assets/images/${folderName}`;
                articleJSON = {
                    type: "image-gallery",
                    title: title,
                    author: author,
                    date: date,
                    imageFolder: imageFolderFull,
                    blockId: target
                };
            } else {
                const content = document.getElementById('post-content').value;
                if (!content) { alert("文章模式需要填写正文内容"); return; }
                articleJSON = {
                    type: "article",
                    title: title,
                    author: author,
                    date: date,
                    content: content,
                    blockId: target
                };
            }
            
            const jsonStr = JSON.stringify(articleJSON, null, 2);
            
            // 复制到剪贴板
            try {
                await navigator.clipboard.writeText(jsonStr);
            } catch(err) {
                console.log("复制失败:", err);
            }
            
            // 下载文件
            const blob = new Blob([jsonStr], {type: 'application/json'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = fileName;
            link.click();
            URL.revokeObjectURL(link.href);
            
            const guide = document.getElementById('upload-guide');
            guide.style.display = 'block';
            if (type === 'image-gallery') {
                guide.innerHTML = `<strong>✅ JSON文件已下载并复制到剪贴板！</strong><br>
                    📁 请上传到 <code>posts/${targetFolder}/</code> 目录<br>
                    🖼️ 请确保图片已上传到 <code>${imageFolderFull}/</code> 目录<br>
                    📤 <a href="https://github.com/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/upload/main/${imageFolderFull}" target="_blank">点击上传图片</a>`;
            } else {
                guide.innerHTML = `<strong>✅ JSON文件已下载并复制到剪贴板！</strong><br>请上传到 <code>posts/${targetFolder}/</code> 目录，然后刷新页面。`;
            }
            
            // 清空表单
            document.getElementById('post-title').value = '';
            document.getElementById('post-author').value = '';
            document.getElementById('post-content').value = '';
            document.getElementById('image-folder-name').value = '';
            
            setTimeout(() => { guide.style.display = 'none'; }, 10000);
        }
        
        function getPostsByBlock(blockId) { return postsDB.get(blockId) || []; }
        
        // 路由
        let currentPage = 'index';
        let currentPageDetail = null;
        
        function openLightbox(imgSrc) {
            document.getElementById('lightbox-img').src = imgSrc;
            document.getElementById('lightbox').classList.add('active');
        }
        function closeLightbox() { document.getElementById('lightbox').classList.remove('active'); }
        
        // 图片详情页渲染
        async function renderImageDetailPage(blockId, post) {
            const images = await getImagesFromFolder(post.imageFolder);
            
            const imagesHtml = images.length === 0 ? 
                `<div class="empty-posts">📭 暂无图片<br>请将图片上传到 <code>${post.imageFolder}/</code> 目录</div>` :
                `<div class="image-grid">${images.map(img => `
                    <div class="image-grid-item" onclick="openLightbox('${img.download_url}')">
                        <img src="${img.download_url}" alt="${img.name}" loading="lazy">
                        <div class="image-caption">${img.name}</div>
                    </div>
                `).join('')}</div>`;
            
            return `
                <div>
                    <div style="margin-bottom:1.5rem;">
                        <button class="back-home-btn" onclick="backToColumnList('${encodeURIComponent(blockId)}')">← 返回专栏</button>
                    </div>
                    <div class="image-detail-page">
                        <div class="image-detail-header">
                            <h1 class="image-detail-title">${escapeHtml(post.title)}</h1>
                            <div class="image-detail-meta">
                                <span>✍️ ${escapeHtml(post.author)}</span>
                                <span>📅 ${post.date || '未知日期'}</span>
                            </div>
                        </div>
                        ${imagesHtml}
                        ${images.length > 0 ? `<div class="image-count-info">📸 共 ${images.length} 张图片 · 点击图片可放大</div>` : ''}
                    </div>
                </div>
            `;
        }
        
        // 普通文章详情页
        function renderArticleDetailPage(blockId, post) {
            let content = post.content || '';
            // 转换图片路径为GitHub原始链接
            content = content.replace(/src="assets\/images\/([^"]+)"/g, (match, filename) => {
                return `src="https://raw.githubusercontent.com/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/assets/images/${filename}"`;
            });
            content = content.replace(/src='assets\/images\/([^']+)'/g, (match, filename) => {
                return `src='https://raw.githubusercontent.com/${GITHUB_CONFIG.owner}/${GITHUB_CONFIG.repo}/${GITHUB_CONFIG.branch}/assets/images/${filename}'`;
            });
            
            return `
                <div>
                    <div style="margin-bottom:1.5rem;">
                        <button class="back-home-btn" onclick="backToColumnList('${encodeURIComponent(blockId)}')">← 返回专栏</button>
                    </div>
                    <div class="article-detail-page">
                        <div class="article-detail-header">
                            <h1 class="article-detail-title">${escapeHtml(post.title)}</h1>
                            <div class="article-detail-meta">
                                <span>✍️ ${escapeHtml(post.author)}</span>
                                <span>📅 ${post.date || '未知日期'}</span>
                            </div>
                        </div>
                        <div class="article-detail-content">${content}</div>
                    </div>
                </div>
            `;
        }
        
        // 专栏列表页
        async function renderColumnListPage(blockId, blockTitle) {
            const posts = getPostsByBlock(blockId);
            
            if (posts.length === 0) {
                return `<div class="column-container"><div class="back-home-bar"><button class="back-home-btn" onclick="backToDetail()">← 返回主页</button></div><div class="column-header"><h2>📂 ${escapeHtml(blockTitle)}</h2></div><div class="empty-posts">✨ 暂无内容，点击右下角「创作文章」发布 ✨<br><br><small>💡 提示：请确保已创建JSON文件并上传到 <code>posts/${blockId.includes('dengjie') ? 'dengjie' : (blockId.includes('wang') ? 'wangboning' : 'together')}/</code> 目录</small></div></div>`;
            }
            
            const postsHtml = posts.map(post => `
                <div class="post-card">
                    <div class="post-title">${escapeHtml(post.title)}</div>
                    <div class="post-meta">
                        <span>✍️ ${escapeHtml(post.author)}</span>
                        <span>📅 ${post.date || '未知日期'}</span>
                        <span class="post-type-badge">${post.type === 'image-gallery' ? '🖼️ 图片专栏' : '📝 文章'}</span>
                    </div>
                    <a class="read-more-link" onclick="viewPost('${encodeURIComponent(blockId)}', '${encodeURIComponent(post.id)}', '${post.type}')">阅读原文 →</a>
                </div>
            `).join('');
            
            return `<div class="column-container"><div class="back-home-bar"><button class="back-home-btn" onclick="backToDetail()">← 返回主页</button></div><div class="column-header"><h2>📂 ${escapeHtml(blockTitle)}</h2><p style="color:#6c8dae;">共 ${posts.length} 个专栏</p></div><div class="posts-grid">${postsHtml}</div></div>`;
        }
        
        // 查看专栏详情
        async function viewPost(blockId, postId, type) {
            const posts = getPostsByBlock(decodeURIComponent(blockId));
            const post = posts.find(p => p.id === postId);
            if (!post) return;
            
            if (type === 'image-gallery') {
                currentPage = 'image_detail';
                window._detailBlockId = decodeURIComponent(blockId);
                window._detailPost = post;
            } else {
                currentPage = 'article_detail';
                window._detailBlockId = decodeURIComponent(blockId);
                window._detailPost = post;
            }
            renderApp();
        }
        
        async function renderApp() {
            const root = document.getElementById('app-root');
            if (currentPage === 'index') {
                root.innerHTML = `<div class="hero-index"><div class="greeting-tag">✦ 双人宇宙 ✦</div><div class="main-headline">邓杰 · 王泊宁<br>两人的日常</div><div class="subhead">独立轨迹 · 交叠星光</div><div class="triple-links"><div class="daily-card" data-person="dengjie"><div class="card-icon">🌿</div><div class="card-name">邓杰的日常</div><div class="card-desc">全栈 · 光影收集者</div></div><div class="daily-card" data-person="wangboning"><div class="card-icon">🎨</div><div class="card-name">王泊宁的日常</div><div class="card-desc">创意开发 · 设计思维</div></div><div class="daily-card" data-person="together"><div class="card-icon">✨🤝✨</div><div class="card-name">两人的共同日常</div><div class="card-desc">共同项目 · 双城灵感</div></div></div><div class="footer-note">点击卡片进入 · 支持文章专栏和图片专栏 ✨</div></div>`;
                document.querySelectorAll('.daily-card').forEach(card => {
                    card.addEventListener('click', () => { currentPage = card.dataset.person; currentPageDetail = null; renderApp(); });
                });
            } 
            else if (currentPage === 'column_list') {
                root.innerHTML = await renderColumnListPage(window._currentBlockId, window._currentBlockTitle);
            }
            else if (currentPage === 'image_detail') {
                root.innerHTML = await renderImageDetailPage(window._detailBlockId, window._detailPost);
            }
            else if (currentPage === 'article_detail') {
                root.innerHTML = renderArticleDetailPage(window._detailBlockId, window._detailPost);
            }
            else {
                const data = personsData[currentPage];
                if (data) {
                    const block1Html = `<div class="block-split-3">${data.block1Items.map((item, i) => `<div class="shape-card ${i===0?'shape-triangle-left':i===1?'shape-trapezoid-mid':'shape-reverse-triangle'}"><a class="section-link" onclick="navigateToColumnList('${item.blockId}','${item.title}')">↗</a><div class="block-icon">${item.icon}</div><h3>${item.title}</h3><p>${item.desc}</p></div>`).join('')}</div>`;
                    const block2Html = `<div class="block-single"><a class="section-link" onclick="navigateToColumnList('${data.singleBlockId}','${data.singleTitle}')">↗</a><div class="single-content"><div><h2>${data.singleTitle}</h2><p>${data.singleDesc}</p></div><div class="single-stats">✨ ${data.singleStat}</div></div></div>`;
                    const block3Html = `<div class="block-split-2"><div class="dual-left"><a class="section-link" onclick="navigateToColumnList('${data.leftBlockId}','${data.leftTitle}')">↗</a><h3>${data.leftTitle}</h3><div class="hobby-list">${data.leftHobbies.map(h=>`<span class="hobby-badge">${h}</span>`).join('')}</div><p>“${data.leftQuote}”</p></div><div class="dual-right"><a class="section-link" onclick="navigateToColumnList('${data.rightBlockId}','${data.rightTitle}')">↗</a><h3>${data.rightTitle}</h3><div class="hobby-list">${data.rightHobbies.map(h=>`<span class="hobby-badge">${h}</span>`).join('')}</div><p>“${data.rightQuote}”</p></div></div>`;
                    root.innerHTML = `<div class="detail-page"><div class="back-home-bar"><button class="back-home-btn" id="back-to-index">← 返回首页</button></div><div style="text-align:center;margin-bottom:1rem;"><h1>${data.name}</h1><div>${data.titleNote}</div><div style="color:#6c8dae;">${data.roleDesc}</div></div><div class="irregular-stack">${block1Html}${block2Html}${block3Html}</div><div class="detail-footer" style="text-align:center;margin-top:2rem;font-size:0.75rem;color:#8ba0bc;">点击 ↗ 进入专栏 · 支持文章和图片两种类型</div></div>`;
                    document.getElementById('back-to-index')?.addEventListener('click', () => { currentPage = 'index'; renderApp(); });
                }
            }
        }
        
        function navigateToColumnList(blockId, blockTitle) {
            currentPageDetail = currentPage;
            currentPage = 'column_list';
            window._currentBlockId = blockId;
            window._currentBlockTitle = blockTitle;
            renderApp();
        }
        
        async function backToColumnList(blockId) {
            currentPage = 'column_list';
            window._currentBlockId = decodeURIComponent(blockId);
            let blockTitle = '';
            for (const person of Object.values(personsData)) {
                for (const item of person.block1Items) {
                    if (item.blockId === window._currentBlockId) blockTitle = item.title;
                }
                if (person.singleBlockId === window._currentBlockId) blockTitle = person.singleTitle;
                if (person.leftBlockId === window._currentBlockId) blockTitle = person.leftTitle;
                if (person.rightBlockId === window._currentBlockId) blockTitle = person.rightTitle;
            }
            window._currentBlockTitle = blockTitle;
            renderApp();
        }
        
        function backToDetail() { 
            if (currentPageDetail) { 
                currentPage = currentPageDetail; 
                currentPageDetail = null; 
                renderApp(); 
            } else { 
                currentPage = 'index'; 
                renderApp(); 
            } 
        }
        
        function escapeHtml(str) { 
            if(!str) return ''; 
            return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); 
        }
        
        function openEditor() { 
            document.getElementById('editor-overlay').style.display = 'block'; 
            document.getElementById('upload-guide').style.display = 'none';
            document.getElementById('post-type').dispatchEvent(new Event('change'));
        }
        function closeEditor() { document.getElementById('editor-overlay').style.display = 'none'; }
        
        // 初始化
        (async function init() {
            const root = document.getElementById('app-root');
            root.innerHTML = '<div class="loading">📡 正在从GitHub加载专栏...</div>';
            try {
                postsDB = await loadAllPostsFromGitHub();
                console.log('加载完成，共加载', postsDB.size, '个板块的文章');
                renderApp();
            } catch(e) {
                console.error('初始化失败:', e);
                root.innerHTML = '<div class="loading error-message">❌ 加载失败，请检查网络后刷新重试</div>';
            }
        })();
    </script>
</body>
</html>
