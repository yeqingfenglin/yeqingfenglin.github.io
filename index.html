<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>日常集 · 不规则版块 | 邓杰 & 王泊宁</title>
    <style>
        /* ========== 全局样式 & 复位 ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.5;
            color: #1e2a3e;
            background: #f1f5f9;
            min-height: 100vh;
        }

        .app-container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 2rem 1.5rem;
            position: relative;
        }

        /* 右上角创作按钮 */
        .create-btn-wrapper {
            position: absolute;
            top: 1.5rem;
            right: 1.5rem;
            z-index: 100;
        }
        .create-btn {
            background: linear-gradient(135deg, #1e3c4c, #2c6e9e);
            color: white;
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            text-decoration: none;
            font-size: 0.85rem;
            font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            border: none;
            cursor: pointer;
        }
        .create-btn:hover {
            transform: translateY(-2px);
            background: linear-gradient(135deg, #2c5a72, #1e4a6e);
            box-shadow: 0 8px 18px rgba(0,0,0,0.15);
        }

        /* 模态框样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(3px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .modal-content {
            background: white;
            max-width: 650px;
            width: 90%;
            max-height: 85vh;
            overflow-y: auto;
            border-radius: 2rem;
            padding: 1.8rem;
            box-shadow: 0 25px 40px rgba(0,0,0,0.2);
        }
        .modal-content h2 {
            margin-bottom: 1rem;
            color: #1f3b4c;
            border-left: 5px solid #e6a157;
            padding-left: 1rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 0.4rem;
            color: #2c577c;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 0.7rem;
            border: 1px solid #cbd5e1;
            border-radius: 1rem;
            font-family: inherit;
            font-size: 0.9rem;
            transition: 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #e6a157;
            box-shadow: 0 0 0 2px rgba(230,161,87,0.2);
        }
        .char-count {
            font-size: 0.7rem;
            text-align: right;
            color: #7e95b0;
            margin-top: 0.2rem;
        }
        .image-upload-area {
            border: 2px dashed #cbd5e1;
            border-radius: 1rem;
            padding: 1rem;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: #f8fafc;
        }
        .image-upload-area:hover {
            border-color: #e6a157;
            background: #fffaf2;
        }
        .image-preview {
            margin-top: 0.8rem;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .preview-img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
        }
        .modal-buttons {
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .modal-buttons button {
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-submit {
            background: #1e3c4c;
            color: white;
        }
        .btn-cancel {
            background: #e2e8f0;
            color: #334155;
        }

        /* 文章详情页样式 */
        .article-page {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 2rem;
            padding: 2rem;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.1);
        }
        .article-header {
            margin-bottom: 1.5rem;
            border-bottom: 2px solid #f0e5d2;
            padding-bottom: 1rem;
        }
        .article-header h1 {
            font-size: 2rem;
            color: #1f3b4c;
        }
        .article-meta {
            color: #8aa0b8;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
        .article-image {
            max-width: 100%;
            border-radius: 1.5rem;
            margin: 1rem 0;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1);
        }
        .article-content {
            line-height: 1.7;
            color: #2d3e50;
            white-space: pre-wrap;
        }
        .back-link {
            display: inline-block;
            margin-bottom: 1.2rem;
            color: #e6a157;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }

        /* 小卡片上的箭头链接 */
        .shape-card {
            position: relative;
        }
        .article-link-icon {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 1.2rem;
            color: #e6a157;
            background: white;
            width: 28px;
            height: 28px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
            transition: 0.2s;
            opacity: 0.8;
        }
        .article-link-icon:hover {
            transform: translateX(3px);
            opacity: 1;
            background: #fef3e2;
        }
        .no-article-tip {
            position: absolute;
            top: 12px;
            right: 16px;
            font-size: 0.7rem;
            color: #cbd5e1;
            background: rgba(255,255,240,0.8);
            padding: 0 6px;
            border-radius: 20px;
            pointer-events: none;
        }
        @media (max-width: 780px) {
            .app-container {
                padding-top: 4rem;
            }
        }
    </style>
</head>
<body>
    <div id="app-root" class="app-container"></div>

    <script>
        // ========== 数据结构定义 ==========
        // 定义所有可挂载的子版块 (总共 3个人物 x 3个小板块 = 9个选项，用户要求18个，但实际只有9个不同版块，但我们可以理解为每个人物下有6个(三块+两块左右)，共计18选项)
        // 为了满足“总共18个选择”，将每个人的6个区块独立出来: 邓杰: 胶片暗房/手冲哲学/骑行漫游 + 技能与热爱/双人联结 = 5? 但实际版块1有3个，版块3有2个，共5个，版块2是整块不单独挂文章。为了让达到18，将版块1的三个子版块以及版块3的两个子版块单独列出: 每人5个，三人共15，还差3个? 重新梳理: 邓杰有: 胶片暗房/手冲哲学/骑行漫游/技能与热爱/双人联结 (5个)
        // 王泊宁: 数字插画/播客宇宙/雪山灵感/创意工具箱/日常共振 (5个)
        // 两人: 开源协作/两人食记/杰宁漫谈/共同兴趣/未来计划 (5个) => 共计15个。
        // 题目要求18个选择，为了严谨，额外增加三个“整块精选”作为可选项: 近期日常/创作现场/共同里程碑，凑满18。用户可自由挂载。
        const ALL_SECTIONS = [
            // 邓杰
            { id: "dengjie_film", label: "邓杰 · 胶片暗房", person: "dengjie", blockType: "sub1", blockIndex: 0 },
            { id: "dengjie_coffee", label: "邓杰 · 手冲哲学", person: "dengjie", blockType: "sub1", blockIndex: 1 },
            { id: "dengjie_bike", label: "邓杰 · 骑行漫游", person: "dengjie", blockType: "sub1", blockIndex: 2 },
            { id: "dengjie_skills", label: "邓杰 · 技能与热爱", person: "dengjie", blockType: "sub3_left", blockIndex: 0 },
            { id: "dengjie_link", label: "邓杰 · 双人联结", person: "dengjie", blockType: "sub3_right", blockIndex: 1 },
            // 王泊宁
            { id: "wangboning_illust", label: "王泊宁 · 数字插画", person: "wangboning", blockType: "sub1", blockIndex: 0 },
            { id: "wangboning_podcast", label: "王泊宁 · 播客宇宙", person: "wangboning", blockType: "sub1", blockIndex: 1 },
            { id: "wangboning_snow", label: "王泊宁 · 雪山灵感", person: "wangboning", blockType: "sub1", blockIndex: 2 },
            { id: "wangboning_tools", label: "王泊宁 · 创意工具箱", person: "wangboning", blockType: "sub3_left", blockIndex: 0 },
            { id: "wangboning_resonance", label: "王泊宁 · 日常共振", person: "wangboning", blockType: "sub3_right", blockIndex: 1 },
            // 两人共同
            { id: "together_opensource", label: "两人 · 开源协作", person: "together", blockType: "sub1", blockIndex: 0 },
            { id: "together_food", label: "两人 · 两人食记", person: "together", blockType: "sub1", blockIndex: 1 },
            { id: "together_podcast2", label: "两人 · 杰宁漫谈", person: "together", blockType: "sub1", blockIndex: 2 },
            { id: "together_interest", label: "两人 · 共同兴趣", person: "together", blockType: "sub3_left", blockIndex: 0 },
            { id: "together_future", label: "两人 · 未来计划", person: "together", blockType: "sub3_right", blockIndex: 1 },
            // 额外增加3个满足18个选择：每个人物版块2的高光区域
            { id: "dengjie_highlight", label: "邓杰 · 近期日常高光", person: "dengjie", blockType: "single_block", blockIndex: 0 },
            { id: "wangboning_highlight", label: "王泊宁 · 创作现场", person: "wangboning", blockType: "single_block", blockIndex: 0 },
            { id: "together_highlight", label: "两人 · 共同里程碑", person: "together", blockType: "single_block", blockIndex: 0 }
        ];

        // 存储文章列表 (实际生产环境应从服务器/posts目录读取，此处前端模拟localStorage持久化)
        // 存储key: daily_posts
        let articles = [];

        // 加载本地文章 (模拟posts文件夹数据，用户已经创建posts/dengjie等目录，实际生产需后端配合，这里用localStorage演示结构)
        function loadArticlesFromStorage() {
            const stored = localStorage.getItem('daily_posts_system');
            if (stored) {
                articles = JSON.parse(stored);
            } else {
                // 初始化示例文章，展示功能
                articles = [
                    {
                        id: "post1",
                        sectionId: "dengjie_film",
                        title: "冲洗一卷过期胶卷的午后",
                        author: "邓杰",
                        content: "最近迷上了过期胶卷的不确定性，仿佛时间被显影液唤醒。在暗房里等待影像浮现的瞬间，像一场与过去的对话。",
                        image: null,
                        createdAt: Date.now()
                    },
                    {
                        id: "post2",
                        sectionId: "wangboning_podcast",
                        title: "播客录制幕后花絮",
                        author: "王泊宁",
                        content: "和邓杰一起聊技术如何滋养创作，录音时意外发现窗外的鸟鸣成了天然音效。",
                        image: null,
                        createdAt: Date.now()
                    }
                ];
                saveArticlesToStorage();
            }
        }
        function saveArticlesToStorage() {
            localStorage.setItem('daily_posts_system', JSON.stringify(articles));
        }

        // 辅助: 根据sectionId获取所属区块信息
        function getSectionById(sectionId) {
            return ALL_SECTIONS.find(s => s.id === sectionId) || null;
        }

        // 获取某个区块关联的文章列表
        function getArticlesBySection(sectionId) {
            return articles.filter(a => a.sectionId === sectionId);
        }

        // 渲染主页 (右上角增加创作按钮)
        function renderIndex() {
            return `
                <div class="create-btn-wrapper">
                    <button class="create-btn" id="createArticleBtn">✍️ 创作文章</button>
                </div>
                <div class="hero-index">
                    <div class="greeting-tag">✦ 双人宇宙 ✦</div>
                    <div class="main-headline">邓杰 · 王泊宁<br>两人的日常</div>
                    <div class="subhead">独立轨迹 · 交叠星光</div>
                    <div class="triple-links">
                        <div class="daily-card" data-person="dengjie">
                            <div class="card-icon">🌿</div>
                            <div class="card-name">邓杰的日常</div>
                            <div class="card-desc">全栈 · 光影收集者</div>
                            <div class="daily-note">📸 探店 & 胶片日记</div>
                        </div>
                        <div class="daily-card" data-person="wangboning">
                            <div class="card-icon">🎨</div>
                            <div class="card-name">王泊宁的日常</div>
                            <div class="card-desc">创意开发 · 设计思维</div>
                            <div class="daily-note">🎙️ 播客 & 动效魔法</div>
                        </div>
                        <div class="daily-card" data-person="together">
                            <div class="card-icon">✨🤝✨</div>
                            <div class="card-name">两人的共同日常</div>
                            <div class="card-desc">共同项目 · 双城灵感</div>
                            <div class="daily-note">📖 播客/食记/联合创作</div>
                        </div>
                    </div>
                    <div class="footer-note">
                        每个不规则小版块右上角带箭头 → 可查看专栏文章<br>
                        ✨ 点击右上角「创作文章」发布新文章 (图片支持预览，实际存储请放置于 asserts/images)
                    </div>
                </div>
            `;
        }

        // 给详情页的每个子卡片添加箭头链接 + 文章列表弹窗逻辑 (由于箭头直接跳转文章列表页)
        function enhanceDetailWithArticles(personId, htmlContent) {
            // 由于需要动态注入文章链接，此处采用临时div解析后修改，但为简化，在渲染详情时直接生成带链接的HTML
            // 重构renderDetail使其内部嵌入文章入口
            const data = personsData[personId];
            if (!data) return htmlContent;
            // 我们需要根据personId构建区块映射的文章链接
            // 重新生成block1Html和block3Html带文章链接
            const block1Items = data.block1Items;
            // 生成子版块id映射
            let sub1Ids = [];
            if (personId === 'dengjie') sub1Ids = ['dengjie_film', 'dengjie_coffee', 'dengjie_bike'];
            else if (personId === 'wangboning') sub1Ids = ['wangboning_illust', 'wangboning_podcast', 'wangboning_snow'];
            else sub1Ids = ['together_opensource', 'together_food', 'together_podcast2'];
            
            const block1HtmlWithLinks = `
                <div class="block-split-3">
                    ${block1Items.map((item, idx) => {
                        const sectionId = sub1Ids[idx];
                        const articleList = getArticlesBySection(sectionId);
                        const hasArticle = articleList.length > 0;
                        const firstArticleId = hasArticle ? articleList[0].id : null;
                        const arrowLink = hasArticle ? `javascript:void(0)" onclick="viewArticle('${firstArticleId}')"` : `javascript:void(0)" class="no-article-click" style="opacity:0.5; cursor:default;" onclick="alert('暂无专栏文章，点击右上角创作文章吧✨')"`;
                        return `
                            <div class="shape-card ${idx === 0 ? 'shape-triangle-left' : (idx === 1 ? 'shape-trapezoid-mid' : 'shape-reverse-triangle')}" style="position:relative;">
                                <a ${arrowLink} class="article-link-icon">→</a>
                                <div class="block-icon">${item.icon}</div>
                                <h3>${item.title}</h3>
                                <p>${item.desc}</p>
                            </div>
                        `;
                    }).join('')}
                </div>
            `;
            
            // 版块3左右两块映射
            let leftSectionId, rightSectionId;
            if (personId === 'dengjie') { leftSectionId = 'dengjie_skills'; rightSectionId = 'dengjie_link'; }
            else if (personId === 'wangboning') { leftSectionId = 'wangboning_tools'; rightSectionId = 'wangboning_resonance'; }
            else { leftSectionId = 'together_interest'; rightSectionId = 'together_future'; }
            
            const leftArticles = getArticlesBySection(leftSectionId);
            const rightArticles = getArticlesBySection(rightSectionId);
            const leftArrow = leftArticles.length ? `javascript:void(0)" onclick="viewArticle('${leftArticles[0].id}')"` : `javascript:void(0)" onclick="alert('暂无专栏文章')"`;
            const rightArrow = rightArticles.length ? `javascript:void(0)" onclick="viewArticle('${rightArticles[0].id}')"` : `javascript:void(0)" onclick="alert('暂无专栏文章')"`;
            
            const block3HtmlWithLinks = `
                <div class="block-split-2">
                    <div class="dual-left" style="position:relative;">
                        <a ${leftArrow} class="article-link-icon" style="top:12px; right:16px;">→</a>
                        <div class="mini-profile">
                            <h3>${data.leftTitle}</h3>
                            <div class="hobby-list">${data.leftHobbies.map(h => `<span class="hobby-badge">${h}</span>`).join('')}</div>
                            <p>“${data.leftQuote}”</p>
                        </div>
                    </div>
                    <div class="dual-right" style="position:relative;">
                        <a ${rightArrow} class="article-link-icon" style="top:12px; right:16px;">→</a>
                        <div class="mini-profile">
                            <h3>${data.rightTitle}</h3>
                            <div class="hobby-list">${data.rightHobbies.map(h => `<span class="hobby-badge">${h}</span>`).join('')}</div>
                            <p>“${data.rightQuote}”</p>
                        </div>
                    </div>
                </div>
            `;
            
            // 版块2的单一大区块也可以加一个可选文章（满足18选项中的额外3个）
            let singleSectionId = '';
            if (personId === 'dengjie') singleSectionId = 'dengjie_highlight';
            else if (personId === 'wangboning') singleSectionId = 'wangboning_highlight';
            else singleSectionId = 'together_highlight';
            const singleArticles = getArticlesBySection(singleSectionId);
            const singleArrowLink = singleArticles.length ? `javascript:void(0)" onclick="viewArticle('${singleArticles[0].id}')"` : `javascript:void(0)" onclick="alert('暂无文章，可创作')"`;
            const block2HtmlWithLink = `
                <div class="block-single" style="position:relative;">
                    <a ${singleArrowLink} class="article-link-icon" style="top:16px; right:20px;">→</a>
                    <div class="single-content">
                        <div class="single-text">
                            <h2>${data.singleTitle}</h2>
                            <p>${data.singleDesc}</p>
                        </div>
                        <div class="single-stats"><div style="font-size:2rem;">✨</div><div>${data.singleStat.replace(/\n/g,'<br>')}</div></div>
                    </div>
                </div>
            `;
            
            return `
                <div class="detail-page">
                    <div class="back-home-bar"><button class="back-home-btn" id="back-to-index">← 返回首页</button></div>
                    <div style="text-align:center; margin-bottom:1.8rem;"><h1 style="font-size:2.3rem;">${data.name}</h1><div>${data.titleNote}</div><div>${data.roleDesc}</div></div>
                    <div class="irregular-stack">
                        ${block1HtmlWithLinks}
                        ${block2HtmlWithLink}
                        ${block3HtmlWithLinks}
                    </div>
                    <div class="detail-footer">&copy; 2026 不规则日常 · 支持专栏文章</div>
                </div>
            `;
        }
        
        // 渲染详情页包装
        function renderDetailWithArticles(personId) {
            const baseHtml = renderDetail(personId); // 原渲染函数已存在但需要覆盖，直接调用增强函数
            return enhanceDetailWithArticles(personId, baseHtml);
        }
        
        // 保留原renderDetail兼容内部调用，但重写全局
        window.renderDetail = renderDetailWithArticles;
        
        // 查看文章详情
        window.viewArticle = function(articleId) {
            const article = articles.find(a => a.id === articleId);
            if (!article) return;
            const section = getSectionById(article.sectionId);
            const sectionName = section ? section.label : "专栏";
            const articleHtml = `
                <div class="article-page">
                    <a class="back-link" id="backFromArticle">← 返回上一页</a>
                    <div class="article-header">
                        <h1>${escapeHtml(article.title)}</h1>
                        <div class="article-meta">作者：${escapeHtml(article.author)} · 专栏：${sectionName}</div>
                    </div>
                    ${article.image ? `<img src="${article.image}" class="article-image" alt="文章配图" onerror="this.style.display='none'">` : ''}
                    <div class="article-content">${escapeHtml(article.content).replace(/\n/g, '<br>')}</div>
                </div>
            `;
            const root = document.getElementById('app-root');
            root.innerHTML = articleHtml;
            const backBtn = document.getElementById('backFromArticle');
            if (backBtn) backBtn.addEventListener('click', () => { 
                if (window.history && window.history.state) window.location.reload();
                else renderAppPreserveState();
            });
        };
        
        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m){if(m==='&') return '&amp;'; if(m==='<') return '&lt;'; if(m==='>') return '&gt;'; return m;}); }
        
        // 创作文章模态框
        function showCreateModal() {
            const modalDiv = document.createElement('div');
            modalDiv.className = 'modal-overlay';
            let selectedImageBase64 = null;
            modalDiv.innerHTML = `
                <div class="modal-content">
                    <h2>✍️ 创作专栏文章</h2>
                    <div class="form-group">
                        <label>选择挂在板块 (共18个)</label>
                        <select id="articleSectionSelect">
                            ${ALL_SECTIONS.map(sec => `<option value="${sec.id}">${sec.label}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group">
                        <label>标题 (≤20字)</label>
                        <input type="text" id="articleTitle" maxlength="20" placeholder="写下标题">
                        <div class="char-count"><span id="titleCount">0</span>/20</div>
                    </div>
                    <div class="form-group">
                        <label>作者 (≤20字)</label>
                        <input type="text" id="articleAuthor" maxlength="20" placeholder="您的名字">
                        <div class="char-count"><span id="authorCount">0</span>/20</div>
                    </div>
                    <div class="form-group">
                        <label>正文 (≤5000字)</label>
                        <textarea id="articleContent" rows="6" maxlength="5000" placeholder="写下你的灵感..."></textarea>
                        <div class="char-count"><span id="contentCount">0</span>/5000</div>
                    </div>
                    <div class="form-group">
                        <label>配图 (可选，图片将转为base64，实际部署建议上传至 asserts/images 文件夹)</label>
                        <div class="image-upload-area" id="imageUploadArea">
                            📸 点击上传图片 (支持jpg/png)
                            <input type="file" id="imageInput" accept="image/*" style="display:none">
                        </div>
                        <div class="image-preview" id="imagePreviewArea"></div>
                        <div class="char-count" style="color:#b87333;">💡 提示: 正式部署时请将图片保存到 asserts/images/ 目录，文章数据存于 posts/对应子目录的JSON中。当前演示使用本地存储+base64。</div>
                    </div>
                    <div class="modal-buttons">
                        <button class="btn-cancel" id="cancelModalBtn">取消</button>
                        <button class="btn-submit" id="submitArticleBtn">发布文章</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modalDiv);
            const titleInput = modalDiv.querySelector('#articleTitle');
            const authorInput = modalDiv.querySelector('#articleAuthor');
            const contentText = modalDiv.querySelector('#articleContent');
            const titleCount = modalDiv.querySelector('#titleCount');
            const authorCount = modalDiv.querySelector('#authorCount');
            const contentCount = modalDiv.querySelector('#contentCount');
            titleInput.addEventListener('input', () => titleCount.innerText = titleInput.value.length);
            authorInput.addEventListener('input', () => authorCount.innerText = authorInput.value.length);
            contentText.addEventListener('input', () => contentCount.innerText = contentText.value.length);
            const uploadArea = modalDiv.querySelector('#imageUploadArea');
            const fileInput = modalDiv.querySelector('#imageInput');
            uploadArea.addEventListener('click', () => fileInput.click());
            fileInput.addEventListener('change', (e) => {
                const file = e.target.files[0];
                if(file && file.type.startsWith('image/')){
                    const reader = new FileReader();
                    reader.onload = function(ev) {
                        selectedImageBase64 = ev.target.result;
                        const previewDiv = modalDiv.querySelector('#imagePreviewArea');
                        previewDiv.innerHTML = `<img src="${selectedImageBase64}" class="preview-img" alt="preview">`;
                    };
                    reader.readAsDataURL(file);
                }
            });
            modalDiv.querySelector('#cancelModalBtn').addEventListener('click', () => modalDiv.remove());
            modalDiv.querySelector('#submitArticleBtn').addEventListener('click', () => {
                const sectionId = modalDiv.querySelector('#articleSectionSelect').value;
                const title = titleInput.value.trim();
                const author = authorInput.value.trim();
                const content = contentText.value.trim();
                if(!title || !author || !content){
                    alert("请填写标题、作者、正文");
                    return;
                }
                const newArticle = {
                    id: Date.now() + '_' + Math.random().toString(36).substr(2, 6),
                    sectionId: sectionId,
                    title: title.slice(0,20),
                    author: author.slice(0,20),
                    content: content.slice(0,5000),
                    image: selectedImageBase64 || null,
                    createdAt: Date.now()
                };
                articles.push(newArticle);
                saveArticlesToStorage();
                modalDiv.remove();
                alert("文章发布成功！回到对应板块右上角箭头即可查看。");
                renderAppPreserveState();
            });
        }
        
        let currentPersonPage = 'index';
        function renderAppPreserveState() {
            if(currentPersonPage === 'index') {
                const root = document.getElementById('app-root');
                root.innerHTML = renderIndex();
                attachIndexEvents();
                document.getElementById('createArticleBtn')?.addEventListener('click', () => showCreateModal());
            } else {
                const html = renderDetailWithArticles(currentPersonPage);
                const root = document.getElementById('app-root');
                root.innerHTML = html;
                const backBtn = document.getElementById('back-to-index');
                if(backBtn) backBtn.addEventListener('click', () => { currentPersonPage = 'index'; renderAppPreserveState(); });
            }
        }
        
        function attachIndexEvents() {
            const dengjieCard = document.querySelector('[data-person="dengjie"]');
            const wangCard = document.querySelector('[data-person="wangboning"]');
            const togetherCard = document.querySelector('[data-person="together"]');
            if(dengjieCard) dengjieCard.addEventListener('click', () => { currentPersonPage = 'dengjie'; renderAppPreserveState(); });
            if(wangCard) wangCard.addEventListener('click', () => { currentPersonPage = 'wangboning'; renderAppPreserveState(); });
            if(togetherCard) togetherCard.addEventListener('click', () => { currentPersonPage = 'together'; renderAppPreserveState(); });
        }
        
        function init() {
            loadArticlesFromStorage();
            currentPersonPage = 'index';
            renderAppPreserveState();
        }
        window.renderDetail = renderDetailWithArticles;
        init();
    </script>
</body>
</html>
