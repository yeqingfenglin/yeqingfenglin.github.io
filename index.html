<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>日常集 · 动态专栏版 | 邓杰 & 王泊宁</title>
    <style>
        /* ========== 原有样式保持 & 增强 ========== */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            line-height: 1.5;
            color: #1e2a3e;
            background: #f1f5f9;
            min-height: 100vh;
        }
        .app-container { max-width: 1100px; margin: 0 auto; padding: 2rem 1.5rem; }

        /* 首页样式 */
        .hero-index {
            min-height: 85vh; display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; border-radius: 2.5rem;
            background: linear-gradient(135deg, #fef9f0 0%, #eef2ff 100%);
            box-shadow: 0 20px 35px -12px rgba(0, 0, 0, 0.1); padding: 2.5rem 1.8rem;
        }
        .main-headline { font-size: 3rem; font-weight: 800; background: linear-gradient(125deg, #1e3c4c, #2c6e9e, #e6a157); -webkit-background-clip: text; color: transparent; }

        /* 创作按钮 */
        .create-post-btn {
            position: fixed; top: 20px; right: 20px; z-index: 1000;
            background: #1e3c4c; color: white; padding: 10px 20px;
            border-radius: 50px; text-decoration: none; font-size: 0.9rem;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: 0.3s;
        }
        .create-post-btn:hover { background: #e6a157; transform: translateY(-2px); }

        /* 板块链接箭头 */
        .section-link {
            position: absolute; top: 15px; right: 15px;
            text-decoration: none; font-size: 1.2rem; color: #cbd5e1;
            transition: 0.3s; z-index: 10; font-weight: bold;
        }
        .section-link:hover { color: #e6a157; transform: scale(1.2); }

        /* 不规则板块容器增强 */
        .shape-card, .dual-left, .dual-right { position: relative; background: white; }
        .irregular-stack { display: flex; flex-direction: column; gap: 2rem; }

        /* 编辑器弹窗样式 */
        #editor-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 2000; backdrop-filter: blur(5px);
        }
        .editor-modal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: white; width: 90%; max-width: 600px; padding: 2rem;
            border-radius: 1.5rem; max-height: 90vh; overflow-y: auto;
        }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 600; font-size: 0.9rem; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 0.8rem; border: 1px solid #e2e8f0; border-radius: 0.8rem; outline: none;
        }
        .form-group textarea { height: 200px; resize: vertical; }
        .submit-btn {
            background: #2c6e9e; color: white; border: none; padding: 1rem;
            width: 100%; border-radius: 0.8rem; cursor: pointer; font-weight: bold;
        }

        /* 详情页原有样式 (省略部分重复，已集成在逻辑中) */
        .triple-links { display: flex; flex-wrap: wrap; justify-content: center; gap: 2rem; margin: 2rem 0; }
        .daily-card { background: white; width: 250px; padding: 1.8rem; border-radius: 2rem; cursor: pointer; text-align: center; }
        .block-split-3 { display: grid; grid-template-columns: repeat(3, 1fr); }
        .shape-card { padding: 2rem 1rem; text-align: center; }
        /* ... 其他 CSS 保持原样 ... */
    </style>
</head>
<body>

    <a href="javascript:void(0)" class="create-post-btn" onclick="openEditor()">+ 创作文章</a>

    <div id="app-root" class="app-container"></div>

    <div id="editor-overlay">
        <div class="editor-modal">
            <h2 style="margin-bottom:1.5rem; color:#1e3c4c;">新建专栏文章</h2>
            <div class="form-group">
                <label>选择归属板块 (18路分支)</label>
                <select id="post-target">
                    <optgroup label="邓杰的日常">
                        <option value="dengjie-b1-1">版块1-左 (胶片暗房)</option>
                        <option value="dengjie-b1-2">版块1-中 (手冲哲学)</option>
                        <option value="dengjie-b1-3">版块1-右 (骑行漫游)</option>
                        <option value="dengjie-b2-1">版块2 (近期日常)</option>
                        <option value="dengjie-b3-L">版块3-左 (技能热爱)</option>
                        <option value="dengjie-b3-R">版块3-右 (双人联结)</option>
                    </optgroup>
                    <optgroup label="王泊宁的日常">
                        <option value="wang-b1-1">版块1-左 (数字插画)</option>
                        <option value="wang-b1-2">版块1-中 (播客宇宙)</option>
                        <option value="wang-b1-3">版块1-右 (雪山灵感)</option>
                        <option value="wang-b2-1">版块2 (创作现场)</option>
                        <option value="wang-b3-L">版块3-左 (创意工具)</option>
                        <option value="wang-b3-R">版块3-右 (日常共振)</option>
                    </optgroup>
                    <optgroup label="两人的共同日常">
                        <option value="both-b1-1">版块1-左 (开源协作)</option>
                        <option value="both-b1-2">版块1-中 (两人食记)</option>
                        <option value="both-b1-3">版块1-右 (杰宁漫谈)</option>
                        <option value="both-b2-1">版块2 (共同里程碑)</option>
                        <option value="both-b3-L">版块3-左 (共同兴趣)</option>
                        <option value="both-b3-R">版块3-右 (未来计划)</option>
                    </optgroup>
                </select>
            </div>
            <div class="form-group">
                <label>文章标题 (20字以内)</label>
                <input type="text" id="post-title" maxlength="20" placeholder="请输入标题...">
            </div>
            <div class="form-group">
                <label>作者 (20字以内)</label>
                <input type="text" id="post-author" maxlength="20" placeholder="署名...">
            </div>
            <div class="form-group">
                <label>正文内容 (支持文字与图片链接)</label>
                <textarea id="post-content" maxlength="5000" placeholder="在这里开启你的创作... 若要添加图片，请直接粘贴图片在服务器的地址。"></textarea>
            </div>
            <button class="submit-btn" onclick="generateFile()">生成文章代码并关闭</button>
            <button class="submit-btn" style="background:#94a3b8; margin-top:0.5rem;" onclick="closeEditor()">取消</button>
        </div>
    </div>

    <script>
        // ========== 数据模型 ==========
        const personsData = {
            dengjie: {
                id: 'dengjie', name: '邓杰', titleNote: '🌿 邓杰的日常', roleDesc: '全栈工程师 · 光影收集者',
                block1Ids: ['dengjie-b1-1', 'dengjie-b1-2', 'dengjie-b1-3'],
                block1Items: [
                    { icon: "📷✨", title: "胶片暗房", desc: "每周冲洗黑白胶卷" },
                    { icon: "☕📖", title: "手冲哲学", desc: "探访50+独立咖啡馆" },
                    { icon: "骑行漫游", title: "骑行漫游", desc: "用单车丈量街巷" }
                ],
                singleId: 'dengjie-b2-1',
                singleTitle: "📻 近期日常 · 高光切片",
                singleDesc: "与王泊宁共同维护「两人食光机」小程序。",
                singleStat: "🎞️ 2025 胶片计划",
                leftId: 'dengjie-b3-L', leftTitle: "🎯 技能与热爱", leftHobbies: ["React", "摄影后期"], leftQuote: "代码是逻辑的诗。",
                rightId: 'dengjie-b3-R', rightTitle: "🤝 双人联结", rightHobbies: ["咖啡地图", "播客"], rightQuote: "日常即灵感。"
            },
            wangboning: {
                id: 'wangboning', name: '王泊宁', titleNote: '🎨 王泊宁的日常', roleDesc: '创意开发 · 设计思维',
                block1Ids: ['wang-b1-1', 'wang-b1-2', 'wang-b1-3'],
                block1Items: [
                    { icon: "🎨", title: "数字插画", desc: "创作城市系列插画" },
                    { icon: "🎙️", title: "播客宇宙", desc: "「杰宁漫谈」播放15w+" },
                    { icon: "🏂", title: "雪山灵感", desc: "滑雪与动效的探索" }
                ],
                singleId: 'wang-b2-1',
                singleTitle: "🎬 创作现场 · 正在进行",
                singleDesc: "筹备「24节气日常展」互动装置。",
                singleStat: "🎙️ 播客第三季",
                leftId: 'wang-b3-L', leftTitle: "✨ 创意工具箱", leftHobbies: ["Figma", "GSAP"], leftQuote: "设计让日常发光。",
                rightId: 'wang-b3-R', rightTitle: "💞 日常共振", rightHobbies: ["市集摊主", "读书会"], rightQuote: "平凡日子过成展览。"
            },
            together: {
                id: 'together', name: '邓杰 & 王泊宁', titleNote: '✨ 两人的共同日常', roleDesc: '生活合伙人 · 创意共同体',
                block1Ids: ['both-b1-1', 'both-b1-2', 'both-b1-3'],
                block1Items: [
                    { icon: "🤝", title: "开源协作", desc: "Daily Components 800+ Star" },
                    { icon: "🍜", title: "两人食记", desc: "美食探索IP" },
                    { icon: "🎙️", title: "杰宁漫谈", desc: "分享技术与烟火" }
                ],
                singleId: 'both-b2-1',
                singleTitle: "📌 共同里程碑 · 日常行星",
                singleDesc: "联合完成30+场黑客马拉松。",
                singleStat: "🎉 2026 双城联展",
                leftId: 'both-b3-L', leftTitle: "🌈 共同兴趣", leftHobbies: ["公路旅行", "双人厨艺"], leftQuote: "一起发呆或徒步。",
                rightId: 'both-b3-R', rightTitle: "🌱 未来计划", rightHobbies: ["两人小报", "工作坊"], rightQuote: "记录日常微光。"
            }
        };

        let currentPage = 'index';

        // ========== 逻辑渲染 ==========
        function renderApp() {
            const root = document.getElementById('app-root');
            if (currentPage === 'index') {
                root.innerHTML = `
                    <div class="hero-index">
                        <div class="main-headline">邓杰 · 王泊宁</div>
                        <div class="triple-links">
                            <div class="daily-card" onclick="navTo('dengjie')">🌿 邓杰的日常</div>
                            <div class="daily-card" onclick="navTo('wangboning')">🎨 王泊宁的日常</div>
                            <div class="daily-card" onclick="navTo('together')">✨ 共同日常</div>
                        </div>
                    </div>`;
            } else {
                root.innerHTML = renderDetail(currentPage);
            }
        }

        function renderDetail(id) {
            const d = personsData[id];
            return `
                <div>
                    <button onclick="navTo('index')" style="margin-bottom:2rem; padding:0.5rem 1rem; border-radius:20px; border:none; cursor:pointer;">← 返回</button>
                    <div style="text-align:center; margin-bottom:2rem;">
                        <h1>${d.name}</h1>
                        <p>${d.titleNote}</p>
                    </div>
                    <div class="irregular-stack">
                        <div class="block-split-3">
                            ${d.block1Items.map((item, i) => `
                                <div class="shape-card" style="border:1px solid #eee">
                                    <a href="column.html?id=${d.block1Ids[i]}" class="section-link">↗</a>
                                    <div style="font-size:2rem">${item.icon}</div>
                                    <h3>${item.title}</h3>
                                    <p>${item.desc}</p>
                                </div>
                            `).join('')}
                        </div>
                        <div class="shape-card" style="padding:2rem; border-radius:2rem;">
                            <a href="column.html?id=${d.singleId}" class="section-link">↗</a>
                            <h2>${d.singleTitle}</h2>
                            <p>${d.singleDesc}</p>
                        </div>
                        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
                            <div class="shape-card" style="padding:1.5rem; border-radius:1rem;">
                                <a href="column.html?id=${d.leftId}" class="section-link">↗</a>
                                <h3>${d.leftTitle}</h3>
                                <p>${d.leftQuote}</p>
                            </div>
                            <div class="shape-card" style="padding:1.5rem; border-radius:1rem;">
                                <a href="column.html?id=${d.rightId}" class="section-link">↗</a>
                                <h3>${d.rightTitle}</h3>
                                <p>${d.rightQuote}</p>
                            </div>
                        </div>
                    </div>
                </div>`;
        }

        function navTo(page) { currentPage = page; renderApp(); }

        // ========== 编辑器逻辑 ==========
        function openEditor() { document.getElementById('editor-overlay').style.display = 'block'; }
        function closeEditor() { document.getElementById('editor-overlay').style.display = 'none'; }

        function generateFile() {
            const target = document.getElementById('post-target').value;
            const title = document.getElementById('post-title').value;
            const author = document.getElementById('post-author').value;
            const content = document.getElementById('post-content').value;
            const date = new Date().toISOString().split('T')[0];

            const postData = { target, title, author, content, date };
            const jsonStr = JSON.stringify(postData, null, 2);

            // 模拟文件导出
            console.log("生成的文章JSON内容如下：\n", jsonStr);
            alert("文章代码已在控制台生成！\n请在GitHub仓库 posts/ 对应文件夹下创建 .json 文件并粘贴内容。");
            closeEditor();
        }

        renderApp();
    </script>
</body>
</html>
